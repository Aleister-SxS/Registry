<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Registry — Berserk Guild</title>
<link rel="stylesheet" href="css/style.css?v=2026061512" />
<style>
  /* ── Team card redesign ─────────────────────────────────── */
  .team-card {
    overflow: hidden; height: auto;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
  }
  .team-card:hover {
    border-color: var(--border3);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  /* Uniform card height — clamp description to 3 lines */
  .team-card-desc {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 3.6em; /* keeps short descriptions from collapsing */
  }

  /* Captain label above name */
  .tc-cap-label {
    font-size: 0.6rem; color: var(--text3); font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px;
  }

  /* Larger pips (28px) */
  .pip {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 0.58rem; font-weight: 700;
    transition: transform 0.12s;
  }
  .pip:hover { transform: scale(1.1); }
  .pip-filled {
    background: var(--blue); color: #fff;
    border: 2px solid rgba(79,142,247,0.5);
  }
  .pip-filled.pip-cap {
    background: var(--amber-dim); color: var(--amber);
    border: 2px solid var(--amber-mid);
  }
  .pip-empty {
    background: var(--surface2);
    border: 1.5px dashed rgba(120,160,255,0.22);
  }
  .pip-join {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(79,142,247,0.10); border: 1.5px dashed var(--blue-mid);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 0.85rem; color: var(--blue-bright);
    transition: background 0.15s, border-color 0.15s, transform 0.12s;
  }
  .pip-join:hover {
    background: var(--blue-dim); border-style: solid;
    transform: scale(1.1);
  }

  /* Condensed requirements pill row */
  .req-pill-row {
    display: flex; gap: 5px; flex-wrap: wrap;
    align-items: center; margin-bottom: 0.65rem;
  }
  .req-tag {
    font-size: 0.68rem; padding: 2px 8px; border-radius: 4px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text2);
  }
  .req-tag-open {
    background: var(--green-dim); border-color: var(--green-mid); color: var(--green);
  }

  /* ── Casual badge: light blue (distinct from green Recruiting) */
  .badge-casual {
    background: rgba(96,165,250,0.13);
    color: #60a5fa;
    border: 1px solid rgba(96,165,250,0.35);
  }

  /* ── Join button: green tint ─────────────────────────────── */
  .btn-join {
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    background: rgba(52,211,153,0.13); border: 1px solid rgba(52,211,153,0.4);
    color: var(--green); border-radius: 6px; padding: 5px 12px;
    font-size: 0.78rem; font-weight: 600; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    font-family: inherit; white-space: nowrap; text-decoration: none;
  }
  .btn-join:hover {
    background: rgba(52,211,153,0.22); border-color: rgba(52,211,153,0.6);
    opacity: 1; text-decoration: none;
  }
  .btn-join:active { transform: scale(0.97); }

  /* ── Full button: faded red ──────────────────────────────── */
  .btn-full-disabled {
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(248,113,113,0.10); border: 1px solid rgba(248,113,113,0.3);
    color: var(--red); border-radius: 6px; padding: 5px 12px;
    font-size: 0.78rem; font-weight: 600; opacity: 0.7;
    cursor: not-allowed; font-family: inherit; white-space: nowrap;
  }

  /* ── Surface filter buttons ──────────────────────────────── */
  .filter-surface-bar {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .filter-surface-btn {
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text2); font-size: 0.78rem; padding: 6px 13px;
    border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 5px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    font-family: inherit; font-weight: 500; white-space: nowrap;
  }
  .filter-surface-btn:hover {
    border-color: var(--border3); color: var(--text);
  }
  .filter-surface-btn.active {
    border-color: var(--blue-mid); color: var(--blue-bright);
    background: var(--blue-dim);
  }

  /* ── Advanced filter dropdown (unchanged behaviour) ─────── */
  .filter-dropdown-wrap { position: relative; }
  .filter-dropdown-btn {
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text2); font-size: 0.78rem; padding: 6px 13px;
    border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: border-color 0.15s; font-family: inherit;
  }
  .filter-dropdown-btn:hover { border-color: var(--border3); color: var(--text); }
  .filter-dropdown-menu {
    display: none; position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius);
    min-width: 240px; z-index: 50; padding: 0.5rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .filter-dropdown-menu.open { display: block; }
  .filter-group-label {
    font-family: var(--mono); font-size: 0.65rem; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 6px 8px 3px; margin-top: 4px;
  }
  .filter-check {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 5px; cursor: pointer;
    font-size: 0.82rem; color: var(--text2); transition: background 0.1s;
    user-select: none;
  }
  .filter-check:hover { background: var(--surface2); color: var(--text); }
  .filter-check input[type="checkbox"] {
    width: 14px; height: 14px; accent-color: var(--blue);
    cursor: pointer; flex-shrink: 0;
  }
  .active-filters { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .active-filter-chip {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
    background: var(--blue-dim); border: 1px solid var(--blue-mid);
    color: var(--blue-bright); display: flex; align-items: center; gap: 4px;
  }
  .active-filter-chip button {
    background: none; border: none; color: inherit; cursor: pointer;
    font-size: 0.7rem; padding: 0; opacity: 0.7; line-height: 1;
  }
  .active-filter-chip button:hover { opacity: 1; }
</style>
</head>
<body>
<script src="js/app.js?v=2026061512"></script>
<script>onReady(() => buildNav("index.html"));</script>

<main>
  <div class="section-header">
    <span class="section-title">Team Registry</span>
    <div class="flex gap-sm" style="align-items:center;flex-wrap:wrap;">
      <input class="search-input" id="team-search" placeholder="Search teams…" oninput="renderTeams()" />
      <div class="filter-surface-bar">
        <button class="filter-surface-btn" id="fsb-recruiting" onclick="toggleSurfaceFilter('recruiting')">Recruiting</button>
        <button class="filter-surface-btn" id="fsb-competitive" onclick="toggleSurfaceFilter('competitive')">Competitive</button>
        <button class="filter-surface-btn" id="fsb-casual" onclick="toggleSurfaceFilter('casual')">Casual</button>
        <div class="filter-dropdown-wrap">
          <button class="filter-dropdown-btn" onclick="toggleFilterMenu()">More Filters <span id="filter-count-badge"></span></button>
          <div class="filter-dropdown-menu" id="filter-menu">
            <div class="filter-group-label">Availability</div>
            <label class="filter-check"><input type="checkbox" data-filter="status" data-value="open" onchange="renderTeams()" /> Recruiting</label>
            <label class="filter-check"><input type="checkbox" data-filter="status" data-value="full" onchange="renderTeams()" /> Full</label>
            <label class="filter-check"><input type="checkbox" data-filter="openToAll" data-value="true" onchange="renderTeams()" /> Open to All (no requirements)</label>

            <div class="filter-group-label">Playstyle</div>
            <label class="filter-check"><input type="checkbox" data-filter="playstyle" data-value="Casual" onchange="renderTeams()" /> Casual</label>
            <label class="filter-check"><input type="checkbox" data-filter="playstyle" data-value="Competitive" onchange="renderTeams()" /> Competitive</label>

            <div class="filter-group-label">Composition</div>
            <label class="filter-check"><input type="checkbox" data-filter="comp" data-value="Tank" onchange="renderTeams()" /> Has Tank slot</label>
            <label class="filter-check"><input type="checkbox" data-filter="comp" data-value="Support" onchange="renderTeams()" /> Has Support slot</label>
            <label class="filter-check"><input type="checkbox" data-filter="comp" data-value="DPS" onchange="renderTeams()" /> Has DPS slot</label>

            <div class="filter-group-label">Preferences</div>
            <label class="filter-check"><input type="checkbox" data-filter="discord" data-value="true" onchange="renderTeams()" /> Discord Recommended</label>
            <label class="filter-check"><input type="checkbox" data-filter="lookingForCaptain" data-value="true" onchange="renderTeams()" /> Looking for a Captain</label>

            <div class="filter-group-label">Language Preference</div>
            <div style="padding:4px 8px;">
              <div class="tag-input-wrap" id="lang-filter-wrap" style="background:var(--bg);">
                <div class="tag-input-tags" id="lang-filter-tags"></div>
                <div class="tag-input-dropdown-wrap">
                  <input class="tag-input-search" id="lang-filter-search" placeholder="Search languages…"
                    autocomplete="off" oninput="langFilterSearch()" onfocus="langFilterOpen()" />
                  <div class="tag-dropdown" id="lang-filter-dropdown"></div>
                </div>
              </div>
            </div>
            <div style="padding: 8px 8px 4px;">
              <button class="btn btn-ghost btn-xs w-full" onclick="clearFilters()">Clear All Filters</button>
            </div>
          </div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="refreshTeams()" title="Refresh teams" style="flex-shrink:0;">↻ Refresh</button>
      <span class="count-badge" id="team-count">—</span>
    </div>
  </div>
  <div id="active-filters-row" class="active-filters mb-md"></div>

  <div id="loading" class="loading"><span class="spinner"></span></div>
  <div class="cards-grid" id="teams-grid" style="display:none;"></div>
  <div id="teams-empty" class="empty" style="display:none;">
    <div class="empty-icon">🎮</div>
    <p>No teams match your filters.<br>Try adjusting or clearing them.</p>
  </div>
</main>

<!-- Join request modal -->
<div class="modal-overlay" id="join-modal">
  <div class="modal">
    <div class="modal-title">Request to Join <span id="jm-team-name" style="color:var(--blue-bright);"></span></div>
    <div class="modal-body">Send a request to the team captain. They'll review it and accept or decline.</div>
    <div id="jm-error" class="alert alert-error alert-hidden mt-sm"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeJoinModal()">Cancel</button>
      <button class="btn-join" onclick="doJoinRequest()">Send Request</button>
    </div>
  </div>
</div>

<script>
let allTeams=[], allMembers=[], allRequests=[], settings={};
let joinTargetTeamId=null;

// ── Surface filter buttons ─────────────────────────────────
const _surfaceFilters = new Set();

function toggleSurfaceFilter(key) {
  if (_surfaceFilters.has(key)) _surfaceFilters.delete(key);
  else _surfaceFilters.add(key);
  const btn = el("fsb-" + key);
  if (btn) btn.classList.toggle("active", _surfaceFilters.has(key));
  renderTeams();
}

// ── Dropdown filter menu ───────────────────────────────────
document.addEventListener("click", e => {
  const wrap = document.querySelector(".filter-dropdown-wrap");
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById("filter-menu")?.classList.remove("open");
  }
});

function toggleFilterMenu() {
  document.getElementById("filter-menu").classList.toggle("open");
}

function getActiveFilters() {
  const filters = {};
  document.querySelectorAll("#filter-menu input[type=checkbox]:checked").forEach(cb => {
    const f = cb.dataset.filter;
    if (!filters[f]) filters[f] = [];
    filters[f].push(cb.dataset.value);
  });
  const langTags = langFilterSelected();
  if (langTags.length) filters.language = langTags;
  return filters;
}

// ── Language filter tag input ──────────────────────────────
const _langFilterSelected = [];

function langFilterSelected() { return [..._langFilterSelected]; }

function langFilterOpen() {
  langFilterRenderDropdown();
  el("lang-filter-dropdown").classList.add("open");
}

function langFilterSearch() {
  langFilterRenderDropdown();
  el("lang-filter-dropdown").classList.add("open");
}

function langFilterToggle(lang) {
  const idx = _langFilterSelected.indexOf(lang);
  if (idx >= 0) _langFilterSelected.splice(idx,1);
  else _langFilterSelected.push(lang);
  el("lang-filter-search").value = "";
  langFilterRenderChips();
  langFilterRenderDropdown();
  renderTeams();
}

function langFilterRenderChips() {
  el("lang-filter-tags").innerHTML = _langFilterSelected.map(l =>
    `<span class="tag-chip">${esc(l)}<button class="tag-chip-x" onclick="langFilterToggle('${esc(l)}')">✕</button></span>`
  ).join("");
}

function langFilterRenderDropdown() {
  const q = (el("lang-filter-search")?.value||"").toLowerCase();
  const filtered = LANGUAGES.filter(l => !_langFilterSelected.includes(l) && (!q||l.toLowerCase().includes(q)));
  const dd = el("lang-filter-dropdown");
  if (!dd) return;
  dd.innerHTML = filtered.length
    ? filtered.map(l=>`<div class="tag-dropdown-item" onclick="langFilterToggle('${esc(l)}')">${esc(l)}</div>`).join("")
    : `<div class="tag-dropdown-empty">No results</div>`;
}

document.addEventListener("click", e => {
  const wrap = el("lang-filter-wrap");
  if (wrap && !wrap.contains(e.target)) {
    el("lang-filter-dropdown")?.classList.remove("open");
  }
});

function clearFilters() {
  document.querySelectorAll("#filter-menu input[type=checkbox]").forEach(cb => cb.checked = false);
  _langFilterSelected.length = 0;
  langFilterRenderChips();
  // Also clear surface filters
  _surfaceFilters.clear();
  ["recruiting","competitive","casual"].forEach(k => {
    const btn = el("fsb-" + k);
    if (btn) btn.classList.remove("active");
  });
  renderTeams();
}

function updateActiveBadge(filters) {
  const total = Object.values(filters).reduce((a,b)=>a+b.length,0);
  const badge = el("filter-count-badge");
  if (badge) badge.textContent = total > 0 ? `(${total})` : "";
  const row = el("active-filters-row");
  if (!row) return;
  const labels = {
    status:{"open":"Recruiting","full":"Full"},
    playstyle:{"Casual":"Casual","Competitive":"Competitive"},
    comp:{"Tank":"Has Tank","Support":"Has Support","DPS":"Has DPS"},
    discord:{"true":"Discord Rec."},
    openToAll:{"true":"Open to All"},
    lookingForCaptain:{"true":"Seeking Captain"},
  };
  row.innerHTML = Object.entries(filters).flatMap(([f, vals]) =>
    vals.map(v => {
      const label = labels[f]?.[v] || v;
      return `<div class="active-filter-chip">${label}
        <button onclick="removeFilter('${f}','${v}')">✕</button>
      </div>`;
    })
  ).join("");
  _langFilterSelected.forEach(l => {
    row.innerHTML += `<div class="active-filter-chip">${esc(l)}<button onclick="langFilterToggle('${esc(l)}')">✕</button></div>`;
  });
}

function removeFilter(f, v) {
  const cb = document.querySelector(`#filter-menu input[data-filter="${f}"][data-value="${v}"]`);
  if (cb) { cb.checked = false; renderTeams(); }
}

onReady(async () => {
  if (!getSession()) { window.location.replace('register.html'); return; }
  try {
    const d = await apiGet({ action:"getAll" });
    allTeams   = d.teams   || [];
    allMembers = d.members || [];
    allRequests= d.requests|| [];
    settings   = d.settings|| {};
  } catch(e) {
    allTeams   = demoTeams();
    allMembers = demoMembers();
    allRequests= [];
  }
  hide(el("loading"));
  renderTeams();
});

function demoTeams() {
  return [
    { id:"t1", name:"Shadow Protocol", description:"Highly competitive. Daily scrims.", composition:["Tank","DPS","DPS","Support"], minPower:1800000, minLevel:50, captainId:"m1", captainName:"Alex Chen", status:"open", memberCount:2, playstyle:"Competitive", prefLanguage:"English", requiresDiscord:"TRUE" },
    { id:"t2", name:"Iron Wolves", description:"Semi-casual, good vibes required.", composition:["Tank","Support","DPS","DPS"], minPower:0, minLevel:0, captainId:"m2", captainName:"Jordan Park", status:"open", memberCount:1, playstyle:"Casual", prefLanguage:"Any Language", requiresDiscord:"FALSE" },
  ];
}
function demoMembers() {
  return [
    { id:"m1", name:"Alex Chen", gamertag:"ShadowAce", teamIds:["t1"], isCaptain:"TRUE", avatarUrl:"", class:"Duelist" },
    { id:"m2", name:"Jordan Park", gamertag:"JPark", teamIds:["t2"], isCaptain:"TRUE", avatarUrl:"", class:"Knight" },
  ];
}

function renderTeams() {
  const grid    = el("teams-grid");
  const emptyEl = el("teams-empty");
  el("loading").style.display = "none";
  const search  = (el("team-search")?.value||"").toLowerCase();
  const filters = getActiveFilters();
  updateActiveBadge(filters);

  const session  = getSession();
  const maxSize  = Number(settings.maxTeamSize)||4;
  const myMember = session ? allMembers.find(m=>m.id===session.id) : null;
  const memberTeams = myMember ? (Array.isArray(myMember.teamIds)?myMember.teamIds:(myMember.teamIds||"").split(",").filter(Boolean)) : [];

  let teams = allTeams.filter(t => {
    if (search && !t.name.toLowerCase().includes(search) && !(t.description||"").toLowerCase().includes(search)) return false;
    // Surface filter buttons
    if (_surfaceFilters.has("recruiting") && t.status === "full") return false;
    if (_surfaceFilters.has("competitive") && t.playstyle !== "Competitive") return false;
    if (_surfaceFilters.has("casual") && t.playstyle !== "Casual") return false;
    // Dropdown filters
    if (filters.status?.length && !filters.status.includes(t.status === "full" ? "full" : "open")) return false;
    if (filters.playstyle?.length && !filters.playstyle.includes(t.playstyle)) return false;
    if (filters.comp?.length && !filters.comp.every(r => (Array.isArray(t.composition)?t.composition:[]).includes(r))) return false;
    if (filters.discord?.includes("true") && t.requiresDiscord !== "TRUE") return false;
    if (filters.lookingForCaptain?.includes("true") && t.lookingForCaptain !== "TRUE") return false;
    if (filters.language?.length) {
      const tLang = (t.prefLanguage||"").toLowerCase();
      const match = filters.language.some(l => tLang === l.toLowerCase() || tLang === "any language");
      if (!match) return false;
    }
    if (filters.openToAll?.includes("true") && (Number(t.minPower) > 0 || Number(t.minLevel) > 0)) return false;
    return true;
  });

  el("team-count").textContent = `${teams.length} team${teams.length!==1?"s":""}`;

  if (!teams.length) {
    grid.style.display="none"; emptyEl.style.display="block"; return;
  }
  emptyEl.style.display="none"; grid.style.display="grid";

  grid.innerHTML = teams.map(t => {
    const teamMembers = allMembers.filter(m => {
      const ids = Array.isArray(m.teamIds)?m.teamIds:(m.teamIds||"").split(",").filter(Boolean);
      return ids.includes(t.id);
    });
    const count    = teamMembers.length;
    const isFull   = count >= maxSize || t.status === "full";
    const status   = t.status === "closed" ? "closed" : isFull ? "full" : "open";
    const label    = {open:"Recruiting",full:"Full",closed:"Closed"}[status];
    const isOpenToAll = !Number(t.minPower) && !Number(t.minLevel);
    const comp     = renderComposition(t.composition);
    const alreadyMember = memberTeams.includes(t.id);
    const pendingReq = session && allRequests.find(r=>r.type==="join"&&r.fromId===session.id&&r.teamId===t.id&&r.status==="pending");
    const canReq   = session && status==="open" && !alreadyMember && !pendingReq;

    // Captain info
    const capMember = allMembers.find(m=>m.id===t.captainId);
    const capAv = capMember?.avatarUrl
      ? `<img src="${esc(capMember.avatarUrl)}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;border:1px solid var(--amber-mid);" onerror="this.style.display='none'" />`
      : `<div style="width:20px;height:20px;border-radius:50%;background:var(--amber-dim);border:1px solid var(--amber-mid);display:flex;align-items:center;justify-content:center;font-size:0.48rem;font-weight:700;color:var(--amber);">${(t.captainName||"?")[0]}</div>`;
    const capClass = capMember?.class ? ` · ${esc(CLASS_ICONS[capMember.class]||"")} ${esc(capMember.class)}` : "";

    // Playstyle badge — Casual is light blue, Competitive is purple
    const styleBadge = t.playstyle
      ? `<span class="badge badge-${t.playstyle==="Competitive"?"competitive":"casual"}">${esc(t.playstyle)}</span>`
      : "";

    // Member pips (28px, captain in amber)
    const captainId = t.captainId;
    const pips = Array.from({length:maxSize}, (_,i) => {
      const m = teamMembers[i];
      if (m) {
        const isCap = m.id === captainId;
        if (m.avatarUrl) {
          return `<a href="profile.html?id=${m.id}" title="${esc(m.name)}${isCap?" (Captain)":""}" onclick="event.stopPropagation();">
            <img src="${esc(m.avatarUrl)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid ${isCap?"var(--amber-mid)":"var(--blue-mid)"};" />
          </a>`;
        }
        return `<a href="profile.html?id=${m.id}" title="${esc(m.name)}${isCap?" (Captain)":""}" onclick="event.stopPropagation();">
          <div class="pip pip-filled${isCap?" pip-cap":""}">${(m.name||"?")[0].toUpperCase()}</div>
        </a>`;
      }
      if (canReq) {
        return `<div class="pip-join" onclick="event.stopPropagation();openJoinModal('${t.id}','${esc(t.name)}')" title="Request to join">＋</div>`;
      }
      return `<div class="pip pip-empty"></div>`;
    }).join("");

    // Requirements pill row
    const reqPills = isOpenToAll
      ? `<span class="req-tag req-tag-open">✓ Open to All</span>`
      : `${t.minPower?`<span class="req-tag">⚡ ${formatPower(t.minPower)}+</span>`:""}${t.minLevel?`<span class="req-tag">🎯 Lv.${t.minLevel}+</span>`:""}`;
    const discordTag = t.requiresDiscord==="TRUE" ? `<span class="req-tag">💬 Discord</span>` : "";
    const langTag    = `<span class="req-tag">🌐 ${esc(t.prefLanguage||"Any Language")}</span>`;

    // Join / status button
    let joinBtn = "";
    if (alreadyMember) {
      joinBtn = `<a href="your-team.html" class="btn-join" style="background:var(--blue-dim);border-color:var(--blue-mid);color:var(--blue-bright);">✓ Your Team</a>`;
    } else if (pendingReq) {
      joinBtn = `<button class="btn btn-ghost btn-sm" disabled>Request Pending…</button>`;
    } else if (canReq) {
      joinBtn = `<button class="btn-join" onclick="openJoinModal('${t.id}','${esc(t.name)}')">+ Request to Join</button>`;
    } else if (!session) {
      joinBtn = `<button class="btn-join" onclick="openJoinModal('${t.id}','${esc(t.name)}')">+ Request to Join</button>`;
    } else if (status === "full") {
      joinBtn = `<button class="btn-full-disabled" disabled>Full</button>`;
    } else {
      joinBtn = `<button class="btn-full-disabled" disabled>Not Recruiting</button>`;
    }

    return `<div class="team-card">
      <div class="team-card-header">
        <div style="min-width:0;">
          <div class="team-card-name">${esc(t.name)}</div>
          <div class="tc-cap-label">⚜️ Team Captain</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
            ${capAv}
            <span style="font-size:0.8rem;color:var(--amber);font-weight:600;">${esc(t.captainName||"—")}${capClass}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
          <span class="badge badge-${status}"><span class="badge-dot"></span>${label}</span>
          ${styleBadge}
          ${t.lookingForCaptain==="TRUE"?`<span class="badge badge-amber"><span class="badge-dot"></span>⚜️ Seeking Captain</span>`:""}
        </div>
      </div>

      ${comp ? `<div class="comp-row">${comp}</div>` : ""}
      <div class="team-card-desc">${t.description ? esc(t.description) : `<span style="color:var(--text3);font-style:italic;">No description.</span>`}</div>

      <div class="req-pill-row">${reqPills}${discordTag}${langTag}</div>

      <div class="team-card-footer">
        <div style="display:flex;gap:4px;align-items:center;">${pips}</div>
        <div class="flex gap-xs">
          <a href="team.html?id=${t.id}" class="btn btn-ghost btn-sm">View Team</a>
          ${joinBtn}
        </div>
      </div>
    </div>`;
  }).join("");
}

function openJoinModal(teamId, teamName) {
  joinTargetTeamId = teamId;
  el("jm-team-name").textContent = teamName;
  clearAlert("jm-error");
  el("join-modal").classList.add("open");
}
function closeJoinModal() { el("join-modal").classList.remove("open"); }

async function refreshTeams() {
  const loadEl = el("loading");
  const grid = el("teams-grid");
  if (loadEl) { loadEl.style.display = "block"; }
  if (grid) grid.style.display = "none";
  try {
    const d = await apiGet({ action:"getAll" });
    allTeams   = d.teams   || [];
    allMembers = d.members || [];
    allRequests= d.requests|| [];
    settings   = d.settings|| {};
  } catch(e) {}
  if (loadEl) loadEl.style.display = "none";
  renderTeams();
  toast("Teams refreshed!", "info", 2000);
}

async function doJoinRequest() {
  const session = getSession();
  clearAlert("jm-error");
  if (!session) {
    window.location.href = "register.html";
    return;
  }
  showProcessing("Sending Join Request…");
  closeJoinModal();
  try {
    await apiPost({ action:"joinRequest", memberId:session.id, captainKey:session.captainKey, teamId:joinTargetTeamId });
    allRequests.push({
      id: "pending-" + Date.now(),
      type: "join",
      teamId: joinTargetTeamId,
      fromId: session.id,
      toId: "",
      status: "pending",
    });
    hideProcessing("Join request sent!");
    renderTeams();
  } catch(e) {
    hideProcessing();
    openJoinModal(joinTargetTeamId, el("jm-team-name")?.textContent || "");
    showAlert("jm-error", e.message);
  }
}
</script>
</body>
</html>
