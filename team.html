<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team Profile — Team Registry</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<script src="js/app.js"></script>
<script>onReady(()=>buildNav(""));</script>
<main>
  <div id="loading" class="loading"><span class="spinner"></span></div>
  <div id="content" style="display:none;"></div>
</main>
<script>
let team=null, allMembers=[], allTeams=[], settings={};

onReady(async()=>{
  const id=new URLSearchParams(location.search).get("id");
  if(!id){renderError("No team ID.");return;}
  try{
    const d=await apiGet({action:"getAll"});
    allTeams=d.teams||[];allMembers=d.members||[];settings=d.settings||{};
    team=allTeams.find(t=>t.id===id);
  }catch(e){
    team={id:"t1",name:"Shadow Protocol",captainId:"m1",captainName:"Alex Chen",status:"open",memberCount:2,
      composition:["Tank","DPS","DPS","Support"],description:"Competitive daily scrims.",
      minPower:1800000,minLevel:50,playstyle:"Competitive",requiresDiscord:"TRUE",prefLanguage:"English"};
    allMembers=[
      {id:"m1",name:"Alex Chen",gamertag:"ShadowAce#1234",teamIds:["t1"],class:"Duelist",tier:"T2",power:2100000,level:60},
      {id:"m4",name:"Taylor Kim",gamertag:"TK_Radiant#777",teamIds:["t1"],class:"Knight",tier:"T2",power:1900000,level:55},
    ];
  }
  if(!team){renderError("Team not found.");return;}
  hide(el("loading"));show(el("content"));
  renderTeam();
});

function renderTeam(){
  const session=getSession();
  const members=allMembers.filter(m=>(m.teamIds||[]).includes(team.id));
  const isMember=session&&members.some(m=>m.id===session.id);
  const maxSize=Number(settings.maxTeamSize)||4;
  const isFull=members.length>=maxSize||team.status==="full";
  const status=team.status==="closed"?"closed":isFull?"full":"open";
  const alreadyReq=session&&false;

  el("content").innerHTML=`
    <div class="flex-between mb-lg flex-wrap gap-sm">
      <div>
        <div style="font-size:1.4rem;font-weight:700;">${esc(team.name)}</div>
        <div class="text-sm text-muted">Captain: <a href="profile.html?id=${team.captainId}">${esc(team.captainName||"—")}</a></div>
      </div>
      <div class="flex gap-xs flex-wrap" style="align-items:center;">
        <span class="badge badge-${status}"><span class="badge-dot"></span>${status==="open"?"Recruiting":status==="full"?"Full":"Closed"}</span>
        ${!isMember&&status==="open"?`<button class="btn btn-primary" onclick="openJoinModal()">Request to Join</button>`:""}
        ${isMember?`<a href="your-team.html" class="btn btn-ghost">Team Management →</a>`:""}
      </div>
    </div>

    <div class="two-col" style="align-items:start;">
      <div>
        <!-- Info card -->
        <div class="card mb-md">
          <div class="section-title mb-sm">Team Info</div>
          ${team.description?`<p class="text-sm text-muted mb-sm">${esc(team.description)}</p>`:""}
          <div class="comp-row">${renderComposition(team.composition)}</div>
          <div class="req-row">
            ${team.minPower?`<span class="req-pill">⚡ ${formatPower(team.minPower)}+ Power</span>`:""}
            ${team.minLevel?`<span class="req-pill">🎯 Level ${team.minLevel}+</span>`:""}
            ${team.playstyle?`<span class="badge badge-${team.playstyle==='Competitive'?'competitive':'casual'}">${esc(team.playstyle)}</span>`:""}
            ${team.requiresDiscord==="TRUE"?`<span class="req-pill">💬 Discord required</span>`:""}
            ${team.prefLanguage?`<span class="req-pill">🌐 ${esc(team.prefLanguage)}</span>`:""}
            ${team.lookingForCaptain==="TRUE"?`<span class="badge badge-amber">Seeking Captain</span>`:""}
          </div>
        </div>

        <!-- Roster -->
        <div class="card">
          <div class="section-title mb-sm">Roster (${members.length}/${maxSize})</div>
          <div class="roster-list">
            ${members.map(m=>`<div class="roster-row">
              <div class="roster-info">
                <a href="profile.html?id=${m.id}"><div class="avatar avatar-sm">${initials(m.name)}</div></a>
                <div>
                  <div class="flex-center gap-xs">
                    <a href="profile.html?id=${m.id}" class="font-semibold text-sm">${esc(m.name)}</a>
                    ${m.id===team.captainId?`<span class="badge badge-captain">Captain</span>`:""}
                  </div>
                  <div class="roster-meta">${esc(m.gamertag)}${m.class?" · "+esc(CLASS_ICONS[m.class]||"")+" "+esc(m.class):""}${m.power?" · ⚡"+formatPower(m.power):""}${m.level?" · Lv."+esc(String(m.level)):""}</div>
                </div>
              </div>
            </div>`).join("")}
            ${Array.from({length:maxSize-members.length},()=>`<div class="roster-row" style="opacity:0.4;border-style:dashed;">
              <div class="roster-info"><div class="pip pip-empty"></div><span class="text-xs text-muted">Open slot</span></div>
            </div>`).join("")}
          </div>
        </div>
      </div>

      <!-- Members' playstyle summary -->
      <div>
        <div class="card">
          <div class="section-title mb-sm">Member Profiles</div>
          ${members.map(m=>`<div class="player-card mb-sm" style="cursor:default;">
            <div class="player-top">
              <div class="avatar avatar-md">${initials(m.name)}</div>
              <div>
                <div class="player-name">${esc(m.name)}</div>
                <div class="player-id">${esc(m.gamertag)}</div>
              </div>
            </div>
            <div class="tags-row mb-sm">
              ${m.class?`<span class="tag tag-class">${esc(CLASS_ICONS[m.class]||"")} ${esc(m.class)}</span>`:""}
              ${m.playstyle?`<span class="badge badge-${m.playstyle==='Competitive'?'competitive':'casual'}">${esc(m.playstyle)}</span>`:""}
              ${m.power?`<span class="tag tag-power">⚡ ${formatPower(m.power)}</span>`:""}
              ${m.level?`<span class="tag tag-level">🎯 Lv.${esc(String(m.level))}</span>`:""}
            </div>
            <a href="profile.html?id=${m.id}" class="btn btn-ghost btn-sm">View Full Profile</a>
          </div>`).join("")}
        </div>
      </div>
    </div>
  `;
}

function openJoinModal(){
  const session=getSession();
  const tag=session?.gamertag||"";
  const key=prompt(`Enter your Secret Key to request to join ${team.name}:`);
  if(!key)return;
  const playerTag=tag||prompt("Enter your Player ID:");
  if(!playerTag)return;
  apiPost({action:"joinRequest",gamertag:playerTag,captainKey:key,teamId:team.id})
    .then(()=>{ toast("Join request sent!"); renderTeam(); })
    .catch(e=>toast(e.message,"error"));
}

function renderError(msg){
  hide(el("loading"));show(el("content"));
  el("content").innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(msg)}</p></div>`;
}
</script>
</body>
</html>
