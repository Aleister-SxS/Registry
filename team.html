<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team Profile — Berserk Guild</title>
<link rel="stylesheet" href="css/style.css?v=2026061512"/>
<style>
/* ── Hero ────────────────────────────────────────────────────── */
.team-hero{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.5rem 1.75rem 1.25rem;margin-bottom:1rem;}
.team-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;}
.team-name{font-size:1.6rem;font-weight:800;letter-spacing:-0.01em;margin-bottom:6px;}
.team-captain{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text2);}
.team-captain-name{color:var(--amber);font-weight:600;text-decoration:none;}
.team-captain-name:hover{text-decoration:underline;}
.team-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px;}
.team-comp{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-top:1rem;border-top:1px solid var(--border2);}
.team-comp-label{font-size:0.7rem;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}

/* ── Stat strip ──────────────────────────────────────────────── */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;margin-bottom:1rem;}
.stat-tile{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:0.75rem 1rem;display:flex;align-items:center;gap:0.6rem;}
.stat-tile-icon{font-size:1.1rem;flex-shrink:0;color:var(--text3);}
.stat-tile-val{font-size:0.88rem;font-weight:700;line-height:1.2;}
.stat-tile-lbl{font-size:0.65rem;color:var(--text3);margin-top:1px;}

/* ── Two-col layout ──────────────────────────────────────────── */
.team-cols{display:grid;grid-template-columns:1fr 1.15fr;gap:1rem;align-items:start;}

/* ── About / requirements ────────────────────────────────────── */
.req-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.75rem;}
.req-tile{background:var(--surface2);border-radius:var(--radius);padding:0.6rem 0.75rem;}
.req-tile-lbl{font-size:0.65rem;color:var(--text3);margin-bottom:2px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;}
.req-tile-val{font-size:0.82rem;font-weight:600;}

/* ── Roster card ─────────────────────────────────────────────── */
.roster-card-row{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 0.875rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:0.5rem;transition:border-color .15s;}
.roster-card-row:last-child{margin-bottom:0;}
.roster-card-row:hover{border-color:var(--border2);}
.roster-card-av{flex-shrink:0;}
.roster-card-info{flex:1;min-width:0;}
.roster-card-name{font-size:0.88rem;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:2px;}
.roster-card-id{font-size:0.7rem;color:var(--text3);margin-bottom:4px;}
.roster-card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.r-tag{font-size:0.65rem;padding:2px 7px;border-radius:4px;font-weight:600;border:1px solid;}
.r-tag-class{background:var(--blue-dim);border-color:var(--blue-mid);color:var(--blue-bright);}
.r-tag-pow{background:var(--surface3);border-color:var(--border2);color:var(--text2);}
.roster-card-link{font-size:0.7rem;color:var(--blue-bright);flex-shrink:0;text-decoration:none;opacity:0.7;transition:opacity .15s;}
.roster-card-link:hover{opacity:1;}
.roster-slot-empty{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 0.875rem;border:1px dashed var(--border2);border-radius:var(--radius);margin-bottom:0.5rem;opacity:0.45;}
.roster-slot-empty:last-child{margin-bottom:0;}
.roster-slot-dot{width:38px;height:38px;border-radius:50%;border:1px dashed var(--border2);flex-shrink:0;}

/* ── Processing overlay ──────────────────────────────────────── */
.processing-overlay{display:none;position:fixed;inset:0;background:rgba(11,13,18,0.88);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
.processing-overlay.active{display:flex;}
.processing-spinner{width:44px;height:44px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.processing-title{font-size:1rem;font-weight:600;color:var(--text);}
.processing-sub{font-size:0.82rem;color:var(--text2);}

/* ── Edit modal ──────────────────────────────────────────────── */
#edit-team-modal input,
#edit-team-modal select,
#edit-team-modal textarea{color:#fff!important;-webkit-text-fill-color:#fff!important;background:var(--bg)!important;border-color:var(--border2)!important;}
#edit-team-modal input::placeholder,
#edit-team-modal textarea::placeholder{color:var(--text3)!important;}
.et-comp-btn{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:8px 16px;border-radius:7px;cursor:pointer;font-size:0.85rem;font-weight:600;transition:all .15s;}
.et-comp-btn:hover{border-color:var(--border3);color:var(--text);}
.et-comp-btn.sel-tank{background:var(--blue-dim);border-color:var(--blue-mid);color:var(--blue-bright);}
.et-comp-btn.sel-support{background:var(--green-dim);border-color:var(--green-mid);color:var(--green);}
.et-comp-btn.sel-dps{background:var(--red-dim);border-color:var(--red-mid);color:var(--red);}
.et-comp-btn:disabled{opacity:.35;cursor:not-allowed;}
.et-comp-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:5px;font-size:0.78rem;font-weight:600;border:1px solid;}
.et-comp-chip.tank{background:var(--blue-dim);border-color:var(--blue-mid);color:var(--blue-bright);}
.et-comp-chip.support{background:var(--green-dim);border-color:var(--green-mid);color:var(--green);}
.et-comp-chip.dps{background:var(--red-dim);border-color:var(--red-mid);color:var(--red);}
.et-chip-x{background:none;border:none;cursor:pointer;color:inherit;opacity:.6;font-size:0.75rem;padding:0 2px;}
.et-chip-x:hover{opacity:1;}

/* ── Responsive ──────────────────────────────────────────────── */
@media(max-width:640px){
  .team-cols{grid-template-columns:1fr;}
  .stat-strip{grid-template-columns:repeat(2,1fr);}
  .team-hero{padding:1.1rem 1.1rem 1rem;}
  .team-name{font-size:1.25rem;}
}
</style>
</head>
<body>
<script src="js/app.js?v=2026061512"></script>
<script>onReady(()=>buildNav(""));</script>
<main>
  <div id="loading" class="loading"><span class="spinner"></span></div>
  <div id="content" style="display:none;"></div>
</main>

<!-- Edit team modal -->
<div class="modal-overlay" id="edit-team-modal" style="z-index:400;">
  <div class="modal" style="max-width:580px;max-height:90vh;overflow-y:auto;">
    <div class="modal-title" style="margin-bottom:1.25rem;">Edit Team Info</div>
    <div class="field"><label>Team Name</label><input id="et-name" placeholder="Team name" /></div>
    <div class="field mt-sm"><label>Team Description</label><textarea id="et-desc" placeholder="Tell members about your team…"></textarea></div>
    <div class="field mt-sm">
      <label>Ideal Composition <span class="optional">(up to 4 roles)</span></label>
      <div class="flex gap-sm flex-wrap mb-sm">
        <button type="button" class="et-comp-btn" id="et-btn-tank"    onclick="etCompAdd('Tank')"   >🛡️ Tank</button>
        <button type="button" class="et-comp-btn" id="et-btn-support" onclick="etCompAdd('Support')" >➕ Support</button>
        <button type="button" class="et-comp-btn" id="et-btn-dps"     onclick="etCompAdd('DPS')"    >⚔️ DPS</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;min-height:34px;" id="et-comp-slots"></div>
      <div style="font-size:0.72rem;color:var(--text3);margin-top:4px;" id="et-comp-count">0 / 4 roles</div>
    </div>
    <div class="field mt-sm"><label>Team Playstyle</label>
      <select id="et-playstyle">
        <option value="">— Select —</option>
        <option value="Casual">Casual</option>
        <option value="Competitive">Competitive</option>
      </select>
    </div>
    <div class="field-row mt-sm">
      <div class="field"><label>Min Power Rating</label><input id="et-power" placeholder="e.g. 1.5m" /></div>
      <div class="field"><label>Min Character Level</label><input id="et-level" type="number" placeholder="e.g. 40" /></div>
    </div>
    <div class="field mt-sm"><label>Preferred Language</label><select id="et-lang"></select></div>
    <div class="field mt-sm">
      <div class="toggle-row">
        <div><div class="toggle-label">Discord Recommended</div></div>
        <label class="toggle"><input type="checkbox" id="et-discord" /><span class="slider"></span></label>
      </div>
    </div>
    <div class="field mt-sm">
      <div class="toggle-row">
        <div><div class="toggle-label">Open to a New Captain</div><div class="toggle-sublabel">Mark team as seeking a captain</div></div>
        <label class="toggle"><input type="checkbox" id="et-want-captain" /><span class="slider"></span></label>
      </div>
    </div>
    <div id="et-error" class="alert alert-error alert-hidden mt-sm"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditTeam()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmEditTeam()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Processing overlay -->
<div class="processing-overlay" id="team-processing">
  <div class="processing-spinner"></div>
  <div class="processing-title" id="team-processing-title">Saving…</div>
  <div class="processing-sub">Please wait.</div>
</div>

<script>
let team=null,allMembers=[],allTeams=[],settings={};

onReady(async()=>{
  populateSelect("et-lang",LANGUAGES,"— No preference —");
  const id=new URLSearchParams(location.search).get("id");
  if(!id){renderError("No team ID.");return;}
  try{
    const d=await apiGet({action:"getAll"});
    allTeams=d.teams||[];allMembers=d.members||[];settings=d.settings||{};
    team=allTeams.find(t=>t.id===id);
  }catch(e){
    team={id:"t1",name:"Shadow Protocol",captainId:"m1",captainName:"Alex Chen",status:"open",memberCount:2,
      composition:["Tank","DPS","DPS","Support"],description:"Competitive daily scrims. We expect commitment and communication. Min Lv. 50 to join.",
      minPower:1800000,minLevel:50,playstyle:"Competitive",requiresDiscord:"TRUE",prefLanguage:"English",lookingForCaptain:"FALSE"};
    allMembers=[
      {id:"m1",name:"Alex Chen",gamertag:"1234",teamIds:["t1"],class:"Duelist",tier:"T2",power:2100000,level:60,avatarUrl:""},
      {id:"m4",name:"Taylor Kim",gamertag:"5678",teamIds:["t1"],class:"Knight",tier:"T2",power:1900000,level:55,avatarUrl:""},
    ];
  }
  if(!team){renderError("Team not found.");return;}
  hide(el("loading"));show(el("content"));
  renderTeam();
});

function renderTeam(){
  const session=getSession();
  const members=allMembers.filter(m=>{
    const ids=Array.isArray(m.teamIds)?m.teamIds:(m.teamIds||"").split(",").filter(Boolean);
    return ids.includes(team.id);
  });
  const isMember=session&&members.some(m=>m.id===session.id);
  const isCaptain=session&&team.captainId===session.id;
  const maxSize=Number(settings.maxTeamSize)||4;
  const isFull=members.length>=maxSize||team.status==="full";
  const status=team.status==="closed"?"closed":isFull?"full":"open";
  const isOpenToAll=!Number(team.minPower)&&!Number(team.minLevel);
  const comp=Array.isArray(team.composition)?team.composition:(team.composition||"").split(",").filter(Boolean);

  const capMember=allMembers.find(m=>m.id===team.captainId);
  const capAv=capMember?.avatarUrl
    ?`<img src="${esc(capMember.avatarUrl)}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;border:1px solid var(--amber-mid);" onerror="this.style.display='none'" />`
    :`<div style="width:22px;height:22px;border-radius:50%;background:var(--amber-dim);border:1px solid var(--amber-mid);display:flex;align-items:center;justify-content:center;font-size:0.5rem;font-weight:700;color:var(--amber);">${(capMember?.name||team.captainName||"?")[0]}</div>`;
  const capClass=capMember?.class?` · ${esc(CLASS_ICONS[capMember.class]||"")} ${esc(capMember.class)}`:"";

  // Composition chips
  const COMP_CLS={Tank:"comp-pill comp-tank",DPS:"comp-pill comp-dps",Support:"comp-pill comp-support"};
  const compChips=comp.map(r=>`<span class="${COMP_CLS[r]||"comp-pill"}">${r}</span>`).join("");

  // Stat strip values
  const powerStr=team.minPower?`⚡ ${formatPower(team.minPower)}+`:"Any";
  const levelStr=team.minLevel?`Lv.${team.minLevel}+`:"Any";
  const reqStr=isOpenToAll?"Open to all":`${team.minPower?formatPower(team.minPower)+"+":""}${team.minPower&&team.minLevel?" · ":""}${team.minLevel?"Lv."+team.minLevel+"+":""}`;

  // Roster rows
  const memberRows=members.map(m=>{
    const av=m.avatarUrl
      ?`<img src="${esc(m.avatarUrl)}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid var(--blue-mid);" onerror="this.style.display='none'" />`
      :`<div class="avatar avatar-md">${initials(m.name)}</div>`;
    const isCap=m.id===team.captainId;
    return`<div class="roster-card-row">
      <div class="roster-card-av">${av}</div>
      <div class="roster-card-info">
        <div class="roster-card-name">
          <a href="profile.html?id=${m.id}" style="color:var(--text);text-decoration:none;">${esc(m.name)}</a>
          ${isCap?`<span class="badge badge-captain" style="font-size:0.6rem;">⚜️ Captain</span>`:""}
        </div>
        <div class="roster-card-id">${esc(m.gamertag||"")}</div>
        <div class="roster-card-tags">
          ${m.class?`<span class="r-tag r-tag-class">${esc(CLASS_ICONS[m.class]||"")} ${esc(m.class)}</span>`:""}
          ${m.power?`<span class="r-tag r-tag-pow">⚡ ${formatPower(m.power)}</span>`:""}
          ${m.level?`<span class="r-tag r-tag-pow">Lv.${esc(String(m.level))}</span>`:""}
        </div>
      </div>
      <a href="profile.html?id=${m.id}" class="roster-card-link">Profile →</a>
    </div>`;
  }).join("");

  const emptySlots=Array.from({length:maxSize-members.length},()=>`
    <div class="roster-slot-empty">
      <div class="roster-slot-dot"></div>
      <span class="text-xs" style="color:var(--text3);">Open slot</span>
    </div>`).join("");

  el("content").innerHTML=`
    <!-- Hero -->
    <div class="team-hero">
      <div class="team-hero-top">
        <div>
          <div class="team-name">${esc(team.name)}</div>
          <div class="team-captain">
            <span style="font-size:0.7rem;color:var(--amber);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;">⚜️ Captain</span>
            ${capAv}
            <a href="profile.html?id=${team.captainId}" class="team-captain-name">${esc(capMember?.name||team.captainName||"—")}${capClass}</a>
          </div>
          <div class="team-badges">
            <span class="badge badge-${status}"><span class="badge-dot"></span>${status==="open"?"Recruiting":status==="full"?"Full":"Closed"}</span>
            ${team.playstyle?`<span class="badge badge-${team.playstyle==="Competitive"?"competitive":"casual"}">${esc(team.playstyle)}</span>`:""}
            ${team.lookingForCaptain==="TRUE"?`<span class="badge badge-amber"><span class="badge-dot"></span>⚜️ Seeking Captain</span>`:""}
          </div>
        </div>
        <div class="flex gap-xs flex-wrap" style="align-items:flex-start;">
          ${isCaptain?`<button class="btn btn-ghost btn-sm" onclick="openEditTeam()">Edit Info</button>`:""}
          ${isMember?`<a href="your-team.html?team=${team.id}" class="btn btn-ghost btn-sm">Team Management →</a>`:""}
          ${!isMember&&status==="open"?`<button class="btn btn-primary" onclick="openJoinModal()">+ Request to Join</button>`:""}
        </div>
      </div>
      ${comp.length?`<div class="team-comp"><span class="team-comp-label">Formation</span>${compChips}</div>`:""}
    </div>

    <!-- Stat strip -->
    <div class="stat-strip">
      <div class="stat-tile">
        <span class="stat-tile-icon">👥</span>
        <div><div class="stat-tile-val">${members.length} / ${maxSize}</div><div class="stat-tile-lbl">Members</div></div>
      </div>
      <div class="stat-tile">
        <span class="stat-tile-icon">⚡</span>
        <div><div class="stat-tile-val">${isOpenToAll?"Open":reqStr}</div><div class="stat-tile-lbl">Requirements</div></div>
      </div>
      <div class="stat-tile">
        <span class="stat-tile-icon">🌐</span>
        <div><div class="stat-tile-val">${esc(team.prefLanguage||"Any")}</div><div class="stat-tile-lbl">Language</div></div>
      </div>
      <div class="stat-tile">
        <span class="stat-tile-icon">💬</span>
        <div><div class="stat-tile-val">${team.requiresDiscord==="TRUE"?"Recommended":"Not required"}</div><div class="stat-tile-lbl">Discord</div></div>
      </div>
    </div>

    <!-- Body -->
    <div class="team-cols">

      <!-- Left: About -->
      <div class="card">
        <div class="flex-between mb-sm">
          <div class="section-title">About</div>
        </div>
        ${team.description?`<p style="font-size:0.84rem;color:var(--text2);line-height:1.65;margin-bottom:0.875rem;">${esc(team.description)}</p>`:""}
        <div class="req-grid">
          <div class="req-tile">
            <div class="req-tile-lbl">Min Power</div>
            <div class="req-tile-val">${team.minPower?`⚡ ${formatPower(team.minPower)}+`:"Open to all"}</div>
          </div>
          <div class="req-tile">
            <div class="req-tile-lbl">Min Level</div>
            <div class="req-tile-val">${team.minLevel?`Lv.${team.minLevel}+`:"Any"}</div>
          </div>
          <div class="req-tile">
            <div class="req-tile-lbl">Playstyle</div>
            <div class="req-tile-val">${team.playstyle?esc(team.playstyle):"Not specified"}</div>
          </div>
          <div class="req-tile">
            <div class="req-tile-lbl">Discord</div>
            <div class="req-tile-val">${team.requiresDiscord==="TRUE"?"💬 Recommended":"Not required"}</div>
          </div>
        </div>
      </div>

      <!-- Right: Roster -->
      <div class="card">
        <div class="section-title mb-sm">Roster <span style="font-weight:400;color:var(--text3);font-size:0.8rem;">${members.length} / ${maxSize}</span></div>
        ${memberRows}
        ${emptySlots}
      </div>

    </div>
  `;
}

// ── Join modal ────────────────────────────────────────────────
function openJoinModal(){
  const session=getSession();
  if(!session){location.href="register.html";return;}
  confirm_(`Request to Join ${team.name}`,"Send a join request to the team captain? They'll accept or decline.",async()=>{
    showProcessing("Sending Join Request…");
    try{
      await apiPost({action:"joinRequest",memberId:session.id,captainKey:session.captainKey,teamId:team.id});
      renderTeam();
      hideProcessing("Join request sent!");
    }catch(e){hideProcessing();toast(e.message,"error");}
  },false);
}

// ── Edit team ─────────────────────────────────────────────────
const etComp=[];
const ET_ROLE_ICONS={Tank:"🛡️",Support:"➕",DPS:"⚔️"};
const ET_ROLE_CLASS={Tank:"tank",Support:"support",DPS:"dps"};

function etCompAdd(role){if(etComp.length>=4)return;etComp.push(role);etCompRender();}
function etCompRemove(i){etComp.splice(i,1);etCompRender();}
function etCompRender(){
  const count=etComp.length;
  el("et-comp-count").textContent=`${count} / 4 roles`;
  ["tank","support","dps"].forEach(r=>{const btn=el("et-btn-"+r);if(btn)btn.disabled=count>=4;});
  el("et-comp-slots").innerHTML=etComp.map((role,i)=>
    `<div class="et-comp-chip ${ET_ROLE_CLASS[role]}">${ET_ROLE_ICONS[role]} ${role}
      <button class="et-chip-x" onclick="etCompRemove(${i})">✕</button>
    </div>`
  ).join("");
}

function openEditTeam(){
  el("et-name").value=team.name||"";
  el("et-desc").value=team.description||"";
  el("et-playstyle").value=team.playstyle||"";
  el("et-power").value=team.minPower?formatPower(team.minPower):"";
  el("et-level").value=team.minLevel||"";
  el("et-lang").value=team.prefLanguage||"";
  el("et-discord").checked=team.requiresDiscord==="TRUE";
  el("et-want-captain").checked=team.lookingForCaptain==="TRUE";
  etComp.length=0;
  const comp=Array.isArray(team.composition)?team.composition:(team.composition||"").split(",").filter(Boolean);
  comp.forEach(r=>{if(etComp.length<4)etComp.push(r);});
  etCompRender();
  clearAlert("et-error");
  el("edit-team-modal").classList.add("open");
}
function closeEditTeam(){el("edit-team-modal").classList.remove("open");}
function confirmEditTeam(){confirm_("Save Team Changes","Update this team's information?",doEditTeam,false);}

async function doEditTeam(){
  const session=getSession();if(!session)return;
  closeEditTeam();
  clearAlert("et-error");
  const name=el("et-name").value.trim();
  if(!name){toast("Team name required.","error");return;}
  showProcessing("Saving Team Info…");
  try{
    await apiPost({
      action:"captainEditTeam",
      memberId:session.id,captainKey:session.captainKey,teamId:team.id,
      name,description:el("et-desc").value.trim()||"Join up and let's win big!",
      playstyle:el("et-playstyle").value,
      minPower:parsePower(el("et-power").value),
      minLevel:el("et-level").value.trim(),
      requiresDiscord:el("et-discord").checked?"TRUE":"FALSE",
      lookingForCaptain:el("et-want-captain").checked?"TRUE":"FALSE",
      prefLanguage:el("et-lang").value||"Any Language",
      composition:[...etComp],
    });
    Object.assign(team,{
      name,description:el("et-desc").value.trim()||"Join up and let's win big!",
      playstyle:el("et-playstyle").value,
      minPower:parsePower(el("et-power").value)||0,
      minLevel:el("et-level").value.trim(),
      requiresDiscord:el("et-discord").checked?"TRUE":"FALSE",
      lookingForCaptain:el("et-want-captain").checked?"TRUE":"FALSE",
      prefLanguage:el("et-lang").value||"Any Language",
      composition:[...etComp],
    });
    renderTeam();
    hideProcessing("Team info updated!");
  }catch(e){hideProcessing();toast(e.message,"error");}
}

function showProcessing(title="Saving…"){
  const ov=el("team-processing"),ti=el("team-processing-title");
  if(ov)ov.classList.add("active");if(ti)ti.textContent=title;
}
function hideProcessing(successMsg){
  el("team-processing")?.classList.remove("active");
  if(successMsg)toast(successMsg,"success",3500);
}
function renderError(msg){
  hide(el("loading"));show(el("content"));
  el("content").innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(msg)}</p></div>`;
}
</script>
</body>
</html>
