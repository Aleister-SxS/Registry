<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Players — Team Registry</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<script src="js/app.js"></script>
<script>onReady(() => buildNav("players.html"));</script>
<main>
  <div class="section-header">
    <span class="section-title">Players — Looking for Team</span>
    <div class="flex gap-sm" style="align-items:center;flex-wrap:wrap;">
      <input class="search-input" id="player-search" placeholder="Search players…" oninput="renderPlayers()" />
      <span class="count-badge" id="player-count">—</span>
    </div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter(this,'all')">All</button>
    <button class="filter-btn" onclick="setFilter(this,'Casual')">Casual</button>
    <button class="filter-btn" onclick="setFilter(this,'Competitive')">Competitive</button>
  </div>
  <div id="loading" class="loading"><span class="spinner"></span></div>
  <div class="cards-grid" id="players-grid" style="display:none;"></div>
  <div id="players-empty" class="empty" style="display:none;">
    <div class="empty-icon">👾</div><p>No players looking for a team right now.</p>
  </div>
</main>

<!-- Invite modal -->
<div class="modal-overlay" id="invite-modal">
  <div class="modal">
    <div class="modal-title">Invite <span id="inv-target-name"></span></div>
    <div class="modal-body">Confirm your credentials to send a team invite to this player.</div>
    <div class="field"><label>Your Player ID</label><input id="inv-tag" /></div>
    <div class="field mt-sm"><label>Secret Key</label><input id="inv-key" type="password" placeholder="••••••••" /></div>
    <div id="inv-error" class="alert alert-error alert-hidden mt-sm"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeInviteModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doSendInvite()">Send Invite</button>
    </div>
  </div>
</div>

<script>
let allMembers = [], allTeams = [], allRequests = [];
let playstyleFilter = "all";
let inviteTargetId = null;

onReady(async () => {
  try {
    const d = await apiGet({ action:"getAll" });
    allMembers = d.members || [];
    allTeams   = d.teams   || [];
    allRequests= d.requests|| [];
  } catch(e) {
    allMembers = demoMembers();
  }
  renderPlayers();
});

function demoMembers() {
  return [
    { id:"m4",name:"Taylor Kim",gamertag:"TK_Radiant#777",tier:"T2",class:"Duelist",power:1900000,level:55,bio:"Burst-window melee. Short cooldowns drive most damage.",playstyle:"Competitive",lookingForTeam:"TRUE",teamIds:[],prefLanguage:"English",timezone:"UTC-05:00 (EST)" },
    { id:"m5",name:"Morgan Wu",gamertag:"MidOrFeed#EUW",tier:"T1",class:"Mage",power:1100000,level:32,bio:"Ranged caster back from break. Ready to grind.",playstyle:"Casual",lookingForTeam:"TRUE",teamIds:[],prefLanguage:"English",timezone:"UTC+01:00 (CET)" },
  ];
}

function setFilter(btn, f) {
  playstyleFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderPlayers();
}

function renderPlayers() {
  const grid    = el("players-grid");
  const emptyEl = el("players-empty");
  el("loading").style.display = "none";
  const search  = (el("player-search").value||"").toLowerCase();
  const session = getSession();
  const captainTeam = session ? allTeams.find(t=>t.captainId===session.id) : null;

  const players = allMembers.filter(m => {
    if (String(m.lookingForTeam).toUpperCase() !== "TRUE") return false;
    if (playstyleFilter !== "all" && m.playstyle !== playstyleFilter) return false;
    if (search && !m.name.toLowerCase().includes(search) && !m.gamertag.toLowerCase().includes(search)) return false;
    return true;
  });

  el("player-count").textContent = `${players.length} player${players.length!==1?"s":""}`;
  if (!players.length) { grid.style.display="none"; emptyEl.style.display="block"; return; }
  emptyEl.style.display="none"; grid.style.display="grid";

  grid.innerHTML = players.map(m => {
    const alreadyInvited = session && allRequests.find(r=>r.type==="invite"&&r.toId===m.id&&r.fromId===session.id&&r.status==="pending");
    return `<div class="player-card" onclick="location.href='profile.html?id=${m.id}'">
      <div class="player-top">
        <div class="avatar avatar-md">${initials(m.name)}</div>
        <div>
          <div class="player-name">${esc(m.name)}</div>
          <div class="player-id">${esc(m.gamertag)}</div>
        </div>
      </div>
      ${m.bio ? `<div class="player-bio">${esc(m.bio)}</div>` : ""}
      <div class="tags-row mb-sm">
        ${m.tier&&m.class ? `<span class="tag tag-class">${esc(CLASS_ICONS[m.class]||"")} ${esc(m.class)}</span>` : ""}
        ${m.playstyle ? `<span class="badge badge-${m.playstyle==='Competitive'?'competitive':'casual'}">${esc(m.playstyle)}</span>` : ""}
        ${m.power ? `<span class="tag tag-power">⚡ ${formatPower(m.power)}</span>` : ""}
        ${m.level ? `<span class="tag tag-level">🎯 Lv.${esc(String(m.level))}</span>` : ""}
        ${m.prefLanguage ? `<span class="tag">🌐 ${esc(m.prefLanguage)}</span>` : ""}
        ${m.timezone ? `<span class="tag">🕐 ${esc(m.timezone)}</span>` : ""}
      </div>
      ${captainTeam && !alreadyInvited
        ? `<button class="btn btn-primary btn-sm w-full" onclick="event.stopPropagation();openInviteModal('${m.id}','${esc(m.name)}')">Invite to Team</button>`
        : alreadyInvited
          ? `<div class="text-xs text-muted" style="text-align:center;">Invite pending…</div>`
          : ""}
    </div>`;
  }).join("");
}

function openInviteModal(memberId, memberName) {
  inviteTargetId = memberId;
  el("inv-target-name").textContent = memberName;
  el("inv-tag").value = getSession()?.gamertag || "";
  el("inv-key").value = "";
  clearAlert("inv-error");
  el("invite-modal").classList.add("open");
}
function closeInviteModal() { el("invite-modal").classList.remove("open"); }

async function doSendInvite() {
  const tag = el("inv-tag").value.trim();
  const key = el("inv-key").value.trim();
  clearAlert("inv-error");
  if (!tag||!key) { showAlert("inv-error","Enter your credentials."); return; }
  try {
    await apiPost({ action:"sendInvite", gamertag:tag, captainKey:key, toMemberId:inviteTargetId });
    closeInviteModal();
    toast("Invite sent!");
  } catch(e) { showAlert("inv-error",e.message); }
}
</script>
</body>
</html>
