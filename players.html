<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guild Members — Berserk Guild</title>
<link rel="stylesheet" href="css/style.css?v=2026061501" />
<style>
  /* Side-by-side grid, responsive */
  .members-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:0.875rem; align-items:start; }
  @media(max-width:700px){ .members-grid{grid-template-columns:1fr;} }

  /* Member card */
  .mc { background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.15s; }
  .mc:hover { border-color:var(--border3); }

  /* Collapsed header — always visible */
  .mc-header { display:flex;align-items:center;gap:10px;padding:0.75rem 1rem;cursor:pointer;user-select:none; }
  .mc-header:hover { background:var(--surface2); }
  .mc-avatar { width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid var(--blue-mid);flex-shrink:0; }
  .mc-avatar-fb { width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.7rem;font-weight:700;color:var(--blue-bright);flex-shrink:0; }
  .mc-header-info { flex:1;min-width:0; }
  .mc-name { font-size:0.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .mc-id   { font-size:0.7rem;color:var(--text3);font-family:var(--mono); }
  .mc-header-badges { display:flex;gap:4px;flex-wrap:wrap;margin-top:3px; }
  .mc-chevron { color:var(--text3);font-size:0.7rem;transition:transform 0.2s;flex-shrink:0; }
  .mc.open .mc-chevron { transform:rotate(180deg); }

  /* Expanded body */
  .mc-body { display:none;padding:0 1rem 0.875rem; }
  .mc.open .mc-body { display:block; }
  .mc-row { display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.78rem; }
  .mc-row:last-child { border-bottom:none; }
  .mc-label { color:var(--text3);width:80px;flex-shrink:0;font-size:0.72rem; }
  .mc-captaining { display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;align-items:center; }

  /* Filter */
  .filter-dropdown-wrap{position:relative;}
  .filter-dropdown-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text2);font-size:0.8rem;padding:6px 14px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color 0.15s;}
  .filter-dropdown-btn:hover{border-color:var(--border3);color:var(--text);}
  .filter-dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);min-width:240px;z-index:50;padding:0.5rem;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
  .filter-dropdown-menu.open{display:block;}
  .filter-group-label{font-family:var(--mono);font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:6px 8px 3px;margin-top:4px;}
  .filter-check{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:0.82rem;color:var(--text2);transition:background 0.1s;user-select:none;}
  .filter-check:hover{background:var(--surface2);color:var(--text);}
  .filter-check input[type="checkbox"]{width:14px;height:14px;accent-color:var(--blue);cursor:pointer;}
  .active-filters{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
  .active-filter-chip{font-size:0.7rem;padding:2px 8px;border-radius:4px;background:var(--blue-dim);border:1px solid var(--blue-mid);color:var(--blue-bright);display:flex;align-items:center;gap:4px;}
  .active-filter-chip button{background:none;border:none;color:inherit;cursor:pointer;font-size:0.7rem;padding:0;opacity:0.7;}
</style>
</head>
<body>
<script src="js/app.js?v=2026061501"></script>
<script>onReady(()=>buildNav("players.html"));</script>
<main>
  <div class="section-header">
    <span class="section-title">Guild Members</span>
    <div class="flex gap-sm" style="align-items:center;flex-wrap:wrap;">
      <input class="search-input" id="player-search" placeholder="Search members…" oninput="renderPlayers()" />
      <div class="filter-dropdown-wrap">
        <button class="filter-dropdown-btn" onclick="togglePlayerFilters()">🔽 Filters <span id="player-filter-count"></span></button>
        <div class="filter-dropdown-menu" id="player-filter-menu">
          <div class="filter-group-label">Status</div>
          <label class="filter-check"><input type="checkbox" data-pf="lft" onchange="renderPlayers()" /> Looking for Team</label>
          <label class="filter-check"><input type="checkbox" data-pf="wantcaptain" onchange="renderPlayers()" /> Wants to Captain</label>
          <div class="filter-group-label">Role</div>
          <label class="filter-check"><input type="checkbox" data-pf="captain" onchange="renderPlayers()" /> Team Captains</label>
          <div class="filter-group-label">Playstyle</div>
          <label class="filter-check"><input type="checkbox" data-pf="Casual" onchange="renderPlayers()" /> Casual</label>
          <label class="filter-check"><input type="checkbox" data-pf="Competitive" onchange="renderPlayers()" /> Competitive</label>
          <div class="filter-group-label">Discord</div>
          <label class="filter-check"><input type="checkbox" data-pf="hasDiscord" onchange="renderPlayers()" /> Has Discord</label>
          <label class="filter-check"><input type="checkbox" data-pf="noDiscord" onchange="renderPlayers()" /> No Discord</label>
          <div class="filter-group-label">Language</div>
          <div style="padding:4px 8px;">
            <div class="tag-input-wrap" id="plang-filter-wrap" style="background:var(--bg);">
              <div class="tag-input-tags" id="plang-filter-tags"></div>
              <div class="tag-input-dropdown-wrap">
                <input class="tag-input-search" id="plang-filter-search" placeholder="Search languages…" autocomplete="off"
                  oninput="plangFilterSearch()" onfocus="plangFilterOpen()" />
                <div class="tag-dropdown" id="plang-filter-dropdown"></div>
              </div>
            </div>
          </div>
          <div style="padding:8px 8px 4px;">
            <button class="btn btn-ghost btn-xs w-full" onclick="clearPlayerFilters()">Clear All Filters</button>
          </div>
        </div>
      </div>
      <span class="count-badge" id="player-count">—</span>
    </div>
  </div>
  <div id="active-player-filters" class="active-filters mb-md"></div>
  <div id="loading" class="loading"><span class="spinner"></span></div>
  <div class="members-grid" id="players-grid" style="display:none;"></div>
  <div id="players-empty" class="empty" style="display:none;"><div class="empty-icon">👾</div><p>No members match your filters.</p></div>
</main>

<!-- Invite modal — team picker -->
<div class="modal-overlay" id="invite-modal">
  <div class="modal">
    <div class="modal-title">Invite <span id="inv-target-name"></span></div>
    <div class="modal-body" id="inv-modal-body">Choose which of your teams to invite this player to.</div>
    <div id="inv-team-list" style="display:flex;flex-direction:column;gap:0.5rem;margin:1rem 0;"></div>
    <div id="inv-error" class="alert alert-error alert-hidden mt-sm"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeInviteModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
let allMembers=[], allTeams=[], allRequests=[], settings={};
let inviteTargetId=null;
const _plangSelected=[];

document.addEventListener("click", e => {
  const fw=document.querySelector(".filter-dropdown-wrap");
  if(fw&&!fw.contains(e.target)) document.getElementById("player-filter-menu")?.classList.remove("open");
  const lw=el("plang-filter-wrap");
  if(lw&&!lw.contains(e.target)) el("plang-filter-dropdown")?.classList.remove("open");
});
function togglePlayerFilters(){document.getElementById("player-filter-menu").classList.toggle("open");}
function getPlayerFilters(){
  const a=[];
  document.querySelectorAll("#player-filter-menu input[type=checkbox]:checked").forEach(cb=>a.push(cb.dataset.pf));
  return a;
}
function clearPlayerFilters(){
  document.querySelectorAll("#player-filter-menu input[type=checkbox]").forEach(cb=>cb.checked=false);
  _plangSelected.length=0; el("plang-filter-tags").innerHTML=""; renderPlayers();
}
const PF_LABELS={lft:"LFT",wantcaptain:"Wants Captain",captain:"Captains",Casual:"Casual",Competitive:"Competitive",hasDiscord:"Has Discord",noDiscord:"No Discord"};
function updatePlayerFilterBadge(active){
  const badge=el("player-filter-count");
  if(badge)badge.textContent=(active.length+_plangSelected.length)>0?`(${active.length+_plangSelected.length})`:"";
  const row=el("active-player-filters");if(!row)return;
  row.innerHTML=[
    ...active.map(f=>`<div class="active-filter-chip">${PF_LABELS[f]||f}<button onclick="removePlayerFilter('${f}')">✕</button></div>`),
    ..._plangSelected.map(l=>`<div class="active-filter-chip">${esc(l)}<button onclick="plangFilterToggle('${esc(l)}')">✕</button></div>`)
  ].join("");
}
function removePlayerFilter(f){const cb=document.querySelector(`#player-filter-menu input[data-pf="${f}"]`);if(cb){cb.checked=false;renderPlayers();}}
function plangFilterOpen(){plangFilterRenderDD();el("plang-filter-dropdown").classList.add("open");}
function plangFilterSearch(){plangFilterRenderDD();el("plang-filter-dropdown").classList.add("open");}
function plangFilterToggle(lang){
  const idx=_plangSelected.indexOf(lang);
  if(idx>=0)_plangSelected.splice(idx,1);else _plangSelected.push(lang);
  el("plang-filter-search").value="";
  el("plang-filter-tags").innerHTML=_plangSelected.map(l=>`<span class="tag-chip">${esc(l)}<button class="tag-chip-x" onclick="plangFilterToggle('${esc(l)}')">✕</button></span>`).join("");
  plangFilterRenderDD();renderPlayers();
}
function plangFilterRenderDD(){
  const q=(el("plang-filter-search")?.value||"").toLowerCase();
  const f=LANGUAGES.filter(l=>!_plangSelected.includes(l)&&(!q||l.toLowerCase().includes(q)));
  const dd=el("plang-filter-dropdown");if(!dd)return;
  dd.innerHTML=f.length?f.map(l=>`<div class="tag-dropdown-item" onclick="plangFilterToggle('${esc(l)}')">${esc(l)}</div>`).join(""):`<div class="tag-dropdown-empty">No results</div>`;
}

onReady(async()=>{
  try{const d=await apiGet({action:"getAll"});allMembers=d.members||[];allTeams=d.teams||[];allRequests=d.requests||[];settings=d.settings||{};}
  catch(e){allMembers=[];}
  hide(el("loading")); renderPlayers();
});

function toggleMemberCard(id){
  const card=document.getElementById("mc-"+id);
  if(card)card.classList.toggle("open");
}

function renderPlayers(){
  const grid=el("players-grid"),emptyEl=el("players-empty");
  const search=(el("player-search").value||"").toLowerCase();
  const active=getPlayerFilters();
  updatePlayerFilterBadge(active);
  const session=getSession();
  const maxTeams=Number(settings.maxMemberTeams)||3;
  const myCaptainTeams=session?allTeams.filter(t=>t.captainId===session.id):[];

  const members=allMembers.filter(m=>{
    if(active.includes("lft")&&String(m.lookingForTeam).toUpperCase()!=="TRUE")return false;
    if(active.includes("wantcaptain")&&String(m.lookingForCaptainRole).toUpperCase()!=="TRUE")return false;
    if(active.includes("captain")&&String(m.isCaptain).toUpperCase()!=="TRUE")return false;
    if(active.includes("Casual")&&m.playstyle!=="Casual")return false;
    if(active.includes("Competitive")&&m.playstyle!=="Competitive")return false;
    if(active.includes("hasDiscord")&&!m.discordId)return false;
    if(active.includes("noDiscord")&&m.discordId)return false;
    if(_plangSelected.length){const ml=(m.prefLanguage||"").toLowerCase();if(!_plangSelected.some(l=>ml===l.toLowerCase()))return false;}
    if(search&&!m.name.toLowerCase().includes(search)&&!(m.gamertag||"").toLowerCase().includes(search))return false;
    return true;
  });

  el("player-count").textContent=`${members.length} member${members.length!==1?"s":""}`;
  if(!members.length){grid.style.display="none";emptyEl.style.display="block";return;}
  emptyEl.style.display="none";grid.style.display="grid";

  grid.innerHTML=members.map(m=>{
    const isMe=session&&session.id===m.id;
    const isLFT=String(m.lookingForTeam).toUpperCase()==="TRUE";
    const isWC=String(m.lookingForCaptainRole).toUpperCase()==="TRUE";
    const teamCount=(Array.isArray(m.teamIds)?m.teamIds:(m.teamIds||"").split(",").filter(Boolean)).length;
    const captainedTeams=allTeams.filter(t=>t.captainId===m.id);
    const alreadyInvitedAll=session&&myCaptainTeams.length&&allRequests.find(r=>r.type==="invite"&&r.toId===m.id&&r.status==="pending"&&myCaptainTeams.map(t=>t.id).includes(r.teamId));

    const av=m.avatarUrl
      ?`<img src="${esc(m.avatarUrl)}" class="mc-avatar" onerror="this.outerHTML='<div class=mc-avatar-fb>${initials(m.name)}</div>'" />`
      :`<div class="mc-avatar-fb">${initials(m.name)}</div>`;

    // Collapsed header badges
    const hdrBadges=[
      m.class?`<span class="tag tag-class" style="font-size:0.65rem;padding:1px 6px;">${esc(CLASS_ICONS[m.class]||"")} ${esc(m.class)}</span>`:"",
      isLFT?`<span class="badge badge-lfg" style="font-size:0.62rem;">LFT</span>`:"",
      isWC?`<span class="badge badge-amber" style="font-size:0.62rem;">⚜️ WTC</span>`:"",
    ].filter(Boolean).join("");

    // Expanded body rows
    const rows=[
      m.class?`<div class="mc-row"><span class="mc-label">Class</span><span class="tag tag-class">${esc(CLASS_ICONS[m.class]||"")} ${esc(m.class)}</span>${m.tier?` <span style="font-size:0.7rem;color:var(--text3);">(${esc(m.tier)})</span>`:""}</div>`:"",
      m.power||m.level?`<div class="mc-row"><span class="mc-label">Power / Level</span><div class="flex gap-xs">${m.power?`<span class="tag tag-power">⚡ ${formatPower(m.power)}</span>`:""}${m.level?`<span class="tag tag-level">🎯 Lv.${esc(String(m.level))}</span>`:""}</div></div>`:"",
      m.playstyle?`<div class="mc-row"><span class="mc-label">Playstyle</span><span class="badge badge-${m.playstyle==="Competitive"?"competitive":"casual"}">${esc(m.playstyle)}</span></div>`:"",
      m.prefLanguage?`<div class="mc-row"><span class="mc-label">Language</span><span style="font-size:0.78rem;">${esc(m.prefLanguage)}</span></div>`:"",
      `<div class="mc-row"><span class="mc-label">Status</span><div class="flex gap-xs flex-wrap">${isLFT?`<span class="badge badge-lfg">● LFT</span>`:""} ${isWC?`<span class="badge badge-amber" style="font-size:0.66rem;">⚜️ Wants to Captain</span>`:""} ${!isLFT&&!isWC?`<span style="color:var(--text3);font-size:0.78rem;">—</span>`:""}</div></div>`,
      `<div class="mc-row"><span class="mc-label">Discord</span>${m.discordId?`<span class="badge badge-info" style="font-size:0.66rem;">💬 Has Discord</span>`:`<span class="badge" style="background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-size:0.66rem;">💬 No Discord</span>`}</div>`,
    ].filter(Boolean).join("");

    const captainingSection=captainedTeams.length?`<div class="mc-captaining">
      <span style="font-size:0.65rem;color:var(--amber);font-family:var(--mono);letter-spacing:0.06em;font-weight:600;">⚜️ CAPTAINING</span>
      ${captainedTeams.map(t=>`<a href="team.html?id=${t.id}" onclick="event.stopPropagation();"
        style="font-size:0.7rem;padding:2px 8px;border-radius:4px;background:var(--amber-dim);border:1px solid var(--amber-mid);color:var(--amber);font-weight:600;text-decoration:none;">${esc(t.name)}</a>`).join("")}
    </div>`:"";

    const inviteBtn=myCaptainTeams.length&&!isMe&&teamCount<maxTeams&&isLFT&&!alreadyInvitedAll
      ?`<button class="btn btn-primary btn-sm w-full mt-sm" onclick="event.stopPropagation();openInviteModal('${m.id}','${esc(m.name)}')">Invite to Team</button>`
      :alreadyInvitedAll?`<div class="text-xs text-muted mt-sm" style="text-align:center;">Invite pending…</div>`:"";

    return `<div class="mc" id="mc-${m.id}">
      <div class="mc-header" onclick="toggleMemberCard('${m.id}')">
        <a href="profile.html?id=${m.id}" onclick="event.stopPropagation();">${av}</a>
        <div class="mc-header-info">
          <div class="mc-name">${esc(m.name)}${isMe?` <span style="font-size:0.65rem;color:var(--blue-bright);">(You)</span>`:""}</div>
          <div class="mc-id">${esc(m.gamertag||"")}</div>
          <div class="mc-header-badges">${hdrBadges}</div>
        </div>
        <span class="mc-chevron">▼</span>
      </div>
      <div class="mc-body">
        ${rows}
        ${captainingSection}
        <div class="mt-sm"><a href="profile.html?id=${m.id}" class="btn btn-ghost btn-sm w-full" onclick="event.stopPropagation();">View Profile</a></div>
        ${inviteBtn}
      </div>
    </div>`;
  }).join("");
}

function openInviteModal(memberId, memberName) {
  inviteTargetId = memberId;
  el("inv-target-name").textContent = memberName;
  clearAlert("inv-error");

  const session = getSession();
  if (!session) { toast("You must be logged in to send invites.", "error"); return; }

  const myTeams = allTeams.filter(t => t.captainId === session.id);
  const maxSize = Number(settings.maxTeamSize) || 4;

  if (!myTeams.length) {
    el("inv-modal-body").textContent = "You are not a captain of any team.";
    el("inv-team-list").innerHTML = "";
    el("invite-modal").classList.add("open");
    return;
  }

  el("inv-modal-body").textContent = "Choose which of your teams to invite this player to:";
  el("inv-team-list").innerHTML = myTeams.map(t => {
    const memberCount = allMembers.filter(m => (Array.isArray(m.teamIds)?m.teamIds:(m.teamIds||"").split(",").filter(Boolean)).includes(t.id)).length;
    const isFull = memberCount >= maxSize || t.status === "full";
    const alreadyPending = allRequests.find(r => r.type === "invite" && r.toId === memberId && r.status === "pending" && r.teamId === t.id);
    const alreadyMember = (()=>{ const tm=allMembers.find(m=>m.id===memberId); return tm&&(Array.isArray(tm.teamIds)?tm.teamIds:(tm.teamIds||"").split(",").filter(Boolean)).includes(t.id); })();

    let btnHtml;
    if (alreadyMember) {
      btnHtml = `<span style="font-size:0.72rem;color:var(--text3);">Already a member</span>`;
    } else if (alreadyPending) {
      btnHtml = `<span style="font-size:0.72rem;color:var(--amber);">Invite pending</span>`;
    } else if (isFull) {
      btnHtml = `<span style="font-size:0.72rem;color:var(--text3);">Team full</span>`;
    } else {
      btnHtml = `<button class="btn btn-primary btn-sm" onclick="doSendInvite('${t.id}','${esc(t.name)}')">Invite</button>`;
    }

    return `<div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;
      background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);
      padding:0.625rem 0.875rem;">
      <div>
        <div style="font-size:0.88rem;font-weight:600;">${esc(t.name)}</div>
        <div style="font-size:0.72rem;color:var(--text3);">${memberCount}/${maxSize} members</div>
      </div>
      ${btnHtml}
    </div>`;
  }).join("");

  el("invite-modal").classList.add("open");
}

function closeInviteModal() { el("invite-modal").classList.remove("open"); }

async function doSendInvite(teamId, teamName) {
  const session = getSession();
  if (!session) return;
  clearAlert("inv-error");
  closeInviteModal();
  showProcessing("Sending Invite…");
  try {
    await apiPost({action:"sendInvite", memberId:session.id, captainKey:session.captainKey, toMemberId:inviteTargetId, teamId});
    allRequests.push({type:"invite",toId:inviteTargetId,teamId,teamName,status:"pending",id:"local-"+Date.now()});
    hideProcessing("Invite sent to " + teamName + "!");
    renderPlayers();
  } catch(e) {
    hideProcessing();
    toast(e.message, "error");
  }
}
</script>
</body>
</html>
