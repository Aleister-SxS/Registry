<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
<title>Your Messages — Berserk Guild</title>
<link rel="stylesheet" href="css/style.css?v=2026061903" />
<style>
/* ── Full-bleed layout ─────────────────────────────────────────── */
main{max-width:100% !important;margin:0 !important;padding:0 !important;
  overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0;}
body{overflow:hidden;display:flex;flex-direction:column;min-height:100vh;}

/* Shell: two columns on desktop, one column on mobile */
.dm-shell{display:flex;width:100%;flex:1;min-height:0;overflow:hidden;}

/* ── Sidebar ───────────────────────────────────────────────────── */
.dm-sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border2);
  display:flex;flex-direction:column;background:var(--surface);}
.dm-sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.dm-sidebar-title{font-size:0.9rem;font-weight:700;}
.dm-compose-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border2);
  background:none;color:var(--text2);cursor:pointer;font-size:1rem;display:flex;
  align-items:center;justify-content:center;transition:all 0.15s;}
.dm-compose-btn:hover{background:var(--surface2);color:var(--text);}
.dm-search{padding:8px 10px;border-bottom:1px solid var(--border2);flex-shrink:0;}
.dm-search input{width:100%;height:30px;font-size:0.78rem;border:1px solid var(--border2);
  border-radius:6px;background:var(--surface2);color:var(--text);padding:0 10px;box-sizing:border-box;}
.dm-search input:focus{outline:none;border-color:var(--blue);}
.dm-convo-list{flex:1;overflow-y:auto;}
.dm-convo{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;
  border-bottom:1px solid var(--border);position:relative;transition:background 0.1s;}
.dm-convo:hover{background:var(--surface2);}
.dm-convo.active{background:var(--surface2);}
.dm-convo.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--blue);border-radius:0 2px 2px 0;}
.dm-av-wrap{position:relative;flex-shrink:0;}
.dm-av{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--blue-mid);}
.dm-av-fb{width:36px;height:36px;border-radius:50%;background:var(--blue-dim);
  border:1px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:700;color:var(--blue-bright);}
.dm-unread-badge{position:absolute;bottom:-1px;right:-1px;min-width:16px;height:16px;
  border-radius:8px;background:#e24b4a;color:#fff;font-size:0.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;border:1.5px solid var(--surface);padding:0 3px;}
.dm-convo-info{flex:1;min-width:0;}
.dm-convo-name{font-size:0.8rem;font-weight:600;display:flex;justify-content:space-between;align-items:center;}
.dm-convo-time{font-size:0.65rem;color:var(--text3);flex-shrink:0;margin-left:4px;}
.dm-convo-preview{font-size:0.72rem;color:var(--text2);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-top:1px;}
.dm-convo-preview.unread{color:var(--text);font-weight:600;}

/* ── Thread panel ──────────────────────────────────────────────── */
.dm-thread{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
.dm-thread-header{padding:12px 16px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:10px;background:var(--surface);flex-shrink:0;}
.dm-back-btn{display:none;background:none;border:none;color:var(--blue-bright);
  font-size:1.25rem;cursor:pointer;padding:0 6px 0 0;line-height:1;flex-shrink:0;}
.dm-thread-name{font-size:0.95rem;font-weight:700;}
.dm-thread-sub{font-size:0.72rem;color:var(--text2);}
.dm-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.dm-date-div{text-align:center;font-size:0.65rem;color:var(--text3);
  font-family:var(--mono);padding:4px 0;margin:4px 0;}
.dm-msg-row{display:flex;gap:8px;align-items:flex-end;}
.dm-msg-row.mine{flex-direction:row-reverse;}
.dm-msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;object-fit:cover;}
.dm-msg-av-fb{width:28px;height:28px;border-radius:50%;background:var(--blue-dim);
  border:1px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;
  font-size:0.58rem;font-weight:700;color:var(--blue-bright);flex-shrink:0;}
.dm-bubble{max-width:72%;padding:7px 11px;border-radius:12px;font-size:0.82rem;
  line-height:1.45;word-break:break-word;}
.dm-bubble.theirs{background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);border-bottom-left-radius:3px;}
.dm-bubble.mine{background:var(--blue);color:#fff;border-bottom-right-radius:3px;}
.dm-bubble-time{font-size:0.62rem;color:var(--text3);margin-top:2px;}
.dm-bubble.emoji-only{background:none !important;border:none !important;
  padding:2px 4px;font-size:2.2rem;line-height:1.2;}


/* ── Compose area — sticky to bottom, survives virtual keyboard ── */
.dm-compose-area{padding:10px 14px;border-top:1px solid var(--border2);
  background:var(--surface);flex-shrink:0;position:relative;}
.dm-char-count{font-size:0.65rem;color:var(--text3);text-align:right;margin-bottom:4px;}
.dm-char-count.warn{color:var(--amber);}
.dm-char-count.over{color:var(--red);}
.dm-compose-row{display:flex;gap:8px;align-items:flex-end;}
.dm-input{flex:1;min-height:38px;max-height:100px;resize:none;font-size:0.82rem;
  border:1px solid var(--border2);border-radius:8px;background:var(--surface2);
  color:var(--text);padding:8px 12px;font-family:inherit;line-height:1.4;box-sizing:border-box;}
.dm-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,0.12);}
.dm-send-btn{height:38px;padding:0 16px;border-radius:8px;border:none;background:var(--blue);
  color:#fff;font-size:0.82rem;font-weight:600;cursor:pointer;flex-shrink:0;transition:background 0.15s;}
.dm-send-btn:hover{background:var(--blue-mid);}
.dm-send-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* ── Empty / no-convos states ──────────────────────────────────── */
.dm-empty{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--text3);gap:8px;font-size:0.85rem;}
.dm-empty-icon{font-size:2.5rem;opacity:0.25;}
.dm-no-convos{padding:2rem 1rem;text-align:center;color:var(--text3);font-size:0.8rem;}

/* ── New message modal ─────────────────────────────────────────── */
.dm-new-modal .modal{max-width:420px;}
.dm-member-result{display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:6px;cursor:pointer;transition:background 0.1s;}
.dm-member-result:hover{background:var(--surface2);}
.dm-member-result-name{font-size:0.85rem;font-weight:600;}
.dm-member-result-sub{font-size:0.72rem;color:var(--text2);}

/* ═══════════════════════════════════════════════════════════════
   MOBILE  (≤ 600 px)
   – Sidebar and thread each fill the full screen; only one shown
     at a time.  Thread slides in from the right on open.
   – When a thread is open the panel is position:fixed so it is
     always anchored to the real visible viewport — this is the
     only reliable way to keep the compose bar above the virtual
     keyboard on both iOS Safari and Android Chrome.
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 600px) {
  /* Shell is the slide-animation container for the SIDEBAR only */
  .dm-shell{position:relative;overflow:hidden;}

  /* Sidebar: full width, slides out left when thread is open */
  .dm-sidebar{
    width:100%;
    position:absolute;top:0;left:0;bottom:0;right:0;
    transition:transform 0.25s ease;
    z-index:2;
  }
  .dm-shell.thread-open .dm-sidebar{
    transform:translateX(-100%);
    pointer-events:none;
  }

  /* Thread: hidden off-screen right by default */
  .dm-thread{
    width:100%;
    position:absolute;top:0;left:0;bottom:0;right:0;
    transform:translateX(100%);
    transition:transform 0.25s ease;
    z-index:1;
  }

  /* When open: switch to position:fixed so the panel is always
     sized to the VISIBLE viewport (not the layout viewport).
     top = nav height so we don't overlap the nav bar.
     The viewport meta interactive-widget=resizes-content means
     the browser will shrink this height when the keyboard appears,
     keeping the compose area above it. */
  .dm-shell.thread-open .dm-thread{
    position:fixed;
    top:var(--nav-h, 58px);
    bottom:0;
    left:0;
    right:0;
    transform:none;
    height:auto;
    /* flex column already set — messages scrolls, compose is pinned */
  }

  /* Show back button */
  .dm-back-btn{display:block;}

  /* Wider bubbles */
  .dm-bubble{max-width:85%;}

  /* Tighter header */
  .dm-thread-header{padding:10px 12px;}

  /* Messages area must be allowed to shrink */
  .dm-messages{min-height:0;flex:1;}

  /* Extra bottom padding for iOS home-bar safe area */
  .dm-compose-area{
    padding-bottom:max(10px, env(safe-area-inset-bottom, 0px));
  }
}

.emoji-picker-btn{width:38px;height:38px;border-radius:8px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text2);cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.emoji-picker-btn:hover,.emoji-picker-btn.active{background:var(--blue-dim);border-color:var(--blue-mid);color:var(--blue-bright);}
/* ── Emoji picker ──────────────────────────────────────────────── */
.emoji-picker{position:absolute;bottom:100%;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border2);
  z-index:50;display:none;flex-direction:column;box-shadow:0 -4px 16px rgba(0,0,0,0.25);}
.emoji-picker.open{display:flex;}
.emoji-picker-tabs{display:flex;border-bottom:1px solid var(--border2);flex-shrink:0;}
.emoji-tab{flex:1;padding:6px 4px;background:none;border:none;font-size:1rem;
  cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.12s;}
.emoji-tab.active,.emoji-tab:hover{color:var(--text);border-bottom-color:var(--blue);}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;
  padding:6px 8px;overflow-y:auto;max-height:200px;}
.emoji-btn{background:none;border:none;font-size:1.35rem;cursor:pointer;
  padding:4px;border-radius:6px;line-height:1;transition:background 0.1s;}
.emoji-btn:hover{background:var(--surface2);}
</style>
</head>
<body>
<script src="js/app.js?v=2026061903"></script>
<script>onReady(() => buildNav("messages.html"));</script>
<main style="padding:0;overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0;">

<div class="dm-shell" id="dm-shell">
  <!-- ── Sidebar ─────────────────────────────────────── -->
  <div class="dm-sidebar">
    <div class="dm-sidebar-header">
      <span class="dm-sidebar-title">💬 Your Messages</span>
      <button class="dm-compose-btn" title="New message" onclick="openNewDM()">✏️</button>
    </div>
    <div class="dm-search">
      <input id="dm-search-input" placeholder="Search conversations…" oninput="renderConvoList()" />
    </div>
    <div class="dm-convo-list" id="dm-convo-list">
      <div class="dm-no-convos">Loading…</div>
    </div>
  </div>

  <!-- ── Thread panel ───────────────────────────────── -->
  <div class="dm-thread" id="dm-thread">
    <div class="dm-empty" id="dm-empty-state">
      <div class="dm-empty-icon">💬</div>
      <div>Select a conversation or start a new one</div>
      <button class="btn btn-primary btn-sm mt-sm" onclick="openNewDM()">✏️ New Message</button>
    </div>
    <!-- Thread header (hidden until convo selected) -->
    <div class="dm-thread-header" id="dm-thread-header" style="display:none;">
      <!-- Back button — only visible on mobile -->
      <button class="dm-back-btn" onclick="closeThread()" title="Back to conversations">‹</button>
      <div id="dm-thread-av"></div>
      <div>
        <div class="dm-thread-name" id="dm-thread-name"></div>
        <div class="dm-thread-sub" id="dm-thread-sub"></div>
      </div>
      <a id="dm-thread-profile-link" href="#" class="btn btn-ghost btn-xs" style="margin-left:auto;">View Profile</a>
    </div>
    <!-- Messages -->
    <div class="dm-messages" id="dm-messages" style="display:none;"></div>
    <!-- Compose -->
    <div class="dm-compose-area" id="dm-compose-area" style="display:none;">
      <div class="emoji-picker" id="dm-input-emoji-picker"><div class="emoji-picker-tabs"><button class="emoji-tab active" onclick="renderEmojiTab(0,'dm-input')">😀</button><button class="emoji-tab" onclick="renderEmojiTab(1,'dm-input')">👋</button><button class="emoji-tab" onclick="renderEmojiTab(2,'dm-input')">❤️</button><button class="emoji-tab" onclick="renderEmojiTab(3,'dm-input')">⚔️</button><button class="emoji-tab" onclick="renderEmojiTab(4,'dm-input')">🐾</button><button class="emoji-tab" onclick="renderEmojiTab(5,'dm-input')">🌿</button><button class="emoji-tab" onclick="renderEmojiTab(6,'dm-input')">🍕</button><button class="emoji-tab" onclick="renderEmojiTab(7,'dm-input')">🎉</button></div><div class="emoji-grid"></div></div>
      <div class="dm-char-count" id="dm-char-count">0 / 500</div>
      <div class="dm-compose-row">
        <textarea class="dm-input" id="dm-input" rows="1"
          placeholder="Write a message…"
          onkeydown="dmKeydown(event)"
          oninput="dmAutoResize(this);dmUpdateCount(this)"></textarea>
        <button class="emoji-picker-btn" id="dm-input-emoji-btn" title="Emoji" onclick="toggleEmojiPicker('dm-input',this)">😊</button>
        <button class="dm-send-btn" id="dm-send-btn" onclick="dmSend()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- New message modal -->
<div class="modal-overlay dm-new-modal" id="dm-new-modal">
  <div class="modal" style="max-width:420px;">
    <div class="modal-title">New Message</div>
    <div class="modal-body">Search for a guild member to message.</div>
    <div class="field mt-sm">
      <input id="dm-new-search" placeholder="Search by name or Player ID…"
        oninput="dmNewSearch()" autocomplete="off"
        style="width:100%;background:var(--surface2);border-color:var(--border3);" />
    </div>
    <div id="dm-new-results" style="margin-top:8px;max-height:240px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDMNewModal()">Cancel</button>
    </div>
  </div>
</div>

</main>

<script>
let allMembers=[], session=null, activeWithId=null;
const dmCache={};
let convos=[];

onReady(async ()=>{
  session=getSession();
  if(!session){window.location.replace("register.html");return;}
  try{
    const d=await apiGet({action:"getAll",memberId:session.id});
    allMembers=d.members||[];
  }catch(e){toast("Failed to load members","error");return;}

  const params=new URLSearchParams(window.location.search);
  const toId=params.get("to");

  await loadConvos();
  renderConvoList();

  if(toId) await openThread(toId);
  startPolling();
});

// ── Conversations ──────────────────────────────────────────────
async function loadConvos(){
  try{
    const d=await apiPost({action:"getInbox",memberId:session.id,captainKey:session.captainKey});
    convos=d.convos||[];
  }catch(e){ convos=[]; }
}

function renderConvoList(){
  const q=(el("dm-search-input")?.value||"").toLowerCase();
  const filtered=convos.filter(c=>!q||c.withName.toLowerCase().includes(q));
  const listEl=el("dm-convo-list");
  if(!listEl)return;
  if(!filtered.length){
    listEl.innerHTML=`<div class="dm-no-convos">${q?"No conversations match.":"No messages yet.<br>Start a conversation!"}</div>`;
    return;
  }
  listEl.innerHTML=filtered.map(c=>{
    const m=allMembers.find(x=>x.id===c.withId);
    const av=m?.avatarUrl
      ?`<img src="${esc(m.avatarUrl)}" class="dm-av" onerror="this.style.display='none'" />`
      :`<div class="dm-av-fb">${esc((c.withName||"?")[0].toUpperCase())}</div>`;
    const badge=c.unread>0?`<div class="dm-unread-badge">${c.unread}</div>`:"";
    const active=c.withId===activeWithId?" active":"";
    return `<div class="dm-convo${active}" onclick="openThread('${c.withId}')">
      <div class="dm-av-wrap">${av}${badge}</div>
      <div class="dm-convo-info">
        <div class="dm-convo-name">${esc(c.withName)}<span class="dm-convo-time">${formatRelTime(c.lastTime)}</span></div>
        <div class="dm-convo-preview${c.unread>0?" unread":""}">${esc(c.lastText||"")}</div>
      </div>
    </div>`;
  }).join("");
}

// ── Thread ─────────────────────────────────────────────────────
async function openThread(withId){
  activeWithId=withId;
  const withMember=allMembers.find(m=>m.id===withId);
  const withName=withMember?.name||"Unknown";

  // On mobile: slide thread panel in
  el("dm-shell")?.classList.add("thread-open");

  renderConvoList();

  const header=el("dm-thread-header"),emptyState=el("dm-empty-state");
  const messagesEl=el("dm-messages"),composeArea=el("dm-compose-area");
  if(emptyState)emptyState.style.display="none";
  if(header)header.style.display="flex";
  if(messagesEl)messagesEl.style.display="flex";
  if(composeArea)composeArea.style.display="block";

  const av=withMember?.avatarUrl
    ?`<img src="${esc(withMember.avatarUrl)}" class="dm-av" style="width:36px;height:36px;" onerror="this.style.display='none'" />`
    :`<div class="dm-av-fb">${esc((withName)[0].toUpperCase())}</div>`;
  if(el("dm-thread-av"))el("dm-thread-av").innerHTML=av;
  if(el("dm-thread-name"))el("dm-thread-name").textContent=withName;
  if(el("dm-thread-sub"))el("dm-thread-sub").textContent=
    `${withMember?.class||""}${withMember?.gamertag?" · "+withMember.gamertag:""}`.trim();
  if(el("dm-thread-profile-link"))el("dm-thread-profile-link").href=`profile.html?id=${withId}`;

  const input=el("dm-input");
  if(input)input.placeholder=`Message ${withName}…`;

  showProcessing("Loading messages…");
  try{
    const d=await apiPost({action:"getDMs",memberId:session.id,captainKey:session.captainKey,withMemberId:withId});
    dmCache[withId]=d.dms||[];
    hideProcessing();
    renderThread();
    const c=convos.find(x=>x.withId===withId);
    if(c)c.unread=0;
    renderConvoList();
    // Mark all messages in this thread as read
    apiPost({action:"markDMRead",memberId:session.id,captainKey:session.captainKey,withMemberId:withId}).catch(()=>{});
  }catch(e){hideProcessing();toast(e.message,"error");}
}

// Back button — return to sidebar on mobile
function closeThread(){
  el("dm-shell")?.classList.remove("thread-open");
  // Optionally reset active state so no convo is highlighted
  activeWithId=null;
  renderConvoList();
}

function renderThread(){
  const msgs=dmCache[activeWithId]||[];
  const container=el("dm-messages");
  if(!container)return;
  let lastDate="",html="";
  msgs.forEach(msg=>{
    const d=new Date(msg.sentAt);
    const dateStr=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    const timeStr=d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    if(dateStr!==lastDate){html+=`<div class="dm-date-div">${esc(dateStr)}</div>`;lastDate=dateStr;}
    const isMe=msg.fromId===session.id;
    const sender=isMe?session:allMembers.find(m=>m.id===msg.fromId);
    const av=sender?.avatarUrl
      ?`<img src="${esc(sender.avatarUrl)}" class="dm-msg-av" onerror="this.style.display='none'" />`
      :`<div class="dm-msg-av-fb">${esc(((sender?.name||"?")[0]).toUpperCase())}</div>`;
    html+=`<div class="dm-msg-row${isMe?" mine":""}">
      ${av}
      <div style="display:flex;flex-direction:column;${isMe?"align-items:flex-end":""}">
        <div class="dm-bubble ${isMe?"mine":"theirs"}${isEmojiOnly(msg.text)?" emoji-only":""}">${esc(msg.text).replace(/\n/g,"<br>")}</div>
        <div class="dm-bubble-time" style="${isMe?"text-align:right":""}">${esc(timeStr)}${isMe&&!msg.readAt?" · Delivered":""}</div>
      </div>
    </div>`;
  });
  container.innerHTML=html||`<div class="dm-empty" style="flex:1;"><div class="dm-empty-icon">💬</div><div>No messages yet. Say hello!</div></div>`;
  container.scrollTop=container.scrollHeight;
}

// ── Send ───────────────────────────────────────────────────────
async function dmSend(){
  const input=el("dm-input");
  const text=(input?.value||"").trim();
  if(!text||!activeWithId)return;
  if(text.length>500){toast("Message exceeds 500 characters.","error");return;}
  const btn=el("dm-send-btn");
  if(btn)btn.disabled=true;
  try{
    const d=await apiPost({action:"sendDM",memberId:session.id,captainKey:session.captainKey,toMemberId:activeWithId,text});
    if(!dmCache[activeWithId])dmCache[activeWithId]=[];
    dmCache[activeWithId].push(d.dm);
    input.value="";input.style.height="";
    el("dm-char-count").textContent="0 / 500";
    el("dm-char-count").className="dm-char-count";
    renderThread();
    const c=convos.find(x=>x.withId===activeWithId);
    const withMember=allMembers.find(m=>m.id===activeWithId);
    if(c){c.lastText=text;c.lastTime=new Date().toISOString();}
    else convos.unshift({withId:activeWithId,withName:withMember?.name||"Unknown",lastText:text,lastTime:new Date().toISOString(),unread:0});
    renderConvoList();
  }catch(e){toast(e.message,"error");}
  finally{if(btn)btn.disabled=false;}
}

// ── Format relative timestamp in sidebar ───────────────────────
function formatRelTime(iso){
  if(!iso||iso==="now")return iso||"";
  const d=new Date(iso);if(isNaN(d))return iso;
  const diff=Date.now()-d.getTime();
  if(diff<60000)return"now";
  if(diff<3600000)return Math.floor(diff/60000)+"m";
  if(diff<86400000)return Math.floor(diff/3600000)+"h";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

// ── Auto-refresh polling ───────────────────────────────────
let _pollTimer = null;
const POLL_INTERVAL_MS = 15000; // 15 seconds

function startPolling() {
  stopPolling();
  _pollTimer = setInterval(pollForUpdates, POLL_INTERVAL_MS);
}
function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}
// Pause polling when tab is hidden, resume when visible
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  } else {
    if (!_pollTimer) {
      pollForUpdates();
      _pollTimer = setInterval(pollForUpdates, POLL_INTERVAL_MS);
    }
  }
});

async function pollForUpdates() {
  if (!session) return;
  try {
    // Refresh inbox for unread counts
    const d = await apiPost({ action: "getInbox", memberId: session.id, captainKey: session.captainKey });
    const fresh = d.convos || [];

    // Check if active thread has new messages
    if (activeWithId) {
      const freshConvo = fresh.find(c => c.withId === activeWithId);
      const oldConvo   = convos.find(c => c.withId === activeWithId);
      const hadUnread  = oldConvo?.unread || 0;
      const nowUnread  = freshConvo?.unread || 0;
      if (nowUnread > hadUnread || (freshConvo && freshConvo.lastTime !== oldConvo?.lastTime)) {
        // Fetch the actual new messages
        try {
          const td = await apiPost({ action: "getDMs", memberId: session.id, captainKey: session.captainKey, withMemberId: activeWithId });
          const newMsgs = td.dms || [];
          const oldCount = (dmCache[activeWithId] || []).length;
          dmCache[activeWithId] = newMsgs;
          if (newMsgs.length > oldCount) {
            renderThread();
          }
          if (freshConvo) freshConvo.unread = 0;
        } catch(_) {}
      }
    }

    // Update sidebar unread badges for non-active convos
    convos = fresh;
    if (activeWithId) {
      const ac = convos.find(c => c.withId === activeWithId);
      if (ac) ac.unread = 0;
    }
    renderConvoList();
  } catch(_) {}
}

// Returns true if the string contains only emoji characters (and whitespace)
function isEmojiOnly(text) {
  if (!text || !text.trim()) return false;
  // Strip emoji + variation selectors + ZWJ + whitespace and see if anything remains
  const stripped = text.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2300}-\u{23FF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FE0F}\u{1F900}-\u{1F9FF}\u{200D}\s]/gu, "");
  return stripped.length === 0;
}

let _emojiPickerTarget = null;
let _emojiPickerVisible = false;
let _emojiActiveTab = 0;

function toggleEmojiPicker(textareaId, btnEl) {
  if (_emojiPickerTarget === textareaId && _emojiPickerVisible) {
    closeEmojiPicker(); return;
  }
  _emojiPickerTarget = textareaId;
  _emojiPickerVisible = true;
  const pickerId = textareaId + "-emoji-picker";
  const picker = el(pickerId);
  if (!picker) return;
  picker.classList.add("open");
  btnEl.classList.add("active");
  renderEmojiTab(_emojiActiveTab, textareaId);
}

function closeEmojiPicker(textareaId) {
  _emojiPickerVisible = false;
  if (textareaId) {
    el(textareaId + "-emoji-picker")?.classList.remove("open");
    el(textareaId + "-emoji-btn")?.classList.remove("active");
  } else {
    document.querySelectorAll(".emoji-picker").forEach(p => p.classList.remove("open"));
    document.querySelectorAll(".emoji-picker-btn").forEach(b => b.classList.remove("active"));
  }
}

function renderEmojiTab(tabIdx, textareaId) {
  _emojiActiveTab = tabIdx;
  const pickerId = textareaId + "-emoji-picker";
  const picker = el(pickerId);
  if (!picker) return;
  const tabs = picker.querySelectorAll(".emoji-tab");
  tabs.forEach((t, i) => t.classList.toggle("active", i === tabIdx));
  const grid = picker.querySelector(".emoji-grid");
  if (!grid) return;
  grid.innerHTML = EMOJI_DATA[tabIdx].emojis.map(em =>
    `<button class="emoji-btn" onclick="insertEmoji('${textareaId}','${em}')" title="${em}">${em}</button>`
  ).join("");
}

function insertEmoji(textareaId, emoji) {
  const ta = el(textareaId);
  if (!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const val = ta.value;
  ta.value = val.substring(0, start) + emoji + val.substring(end);
  ta.selectionStart = ta.selectionEnd = start + emoji.length;
  ta.focus();
  ta.dispatchEvent(new Event("input"));
}

document.addEventListener("click", (e) => {
  if (!_emojiPickerVisible) return;
  if (e.target.closest(".emoji-picker") || e.target.closest(".emoji-picker-btn")) return;
  closeEmojiPicker();
  _emojiPickerVisible = false;
});
