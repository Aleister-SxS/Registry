<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Team — Team Registry</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<script src="js/app.js"></script>
<script src="js/build-maker.js"></script>
<script>onReady(()=>buildNav("your-team.html"));</script>
<main>
  <div id="loading" class="loading"><span class="spinner"></span></div>
  <div id="content" style="display:none;"></div>
  <div id="not-logged-in" class="empty" style="display:none;">
    <div class="empty-icon">🛡️</div>
    <h3>You're not logged in.</h3>
    <p>Log in to view your teams, manage your roster, and plan your formations.</p>
    <div class="empty-actions">
      <a href="register.html" class="btn btn-primary">Log In / Register</a>
    </div>
  </div>
</main>
<script>
let allTeams=[],allMembers=[],allRequests=[],settings={};
let session=null;

onReady(async()=>{
  session=getSession();
  if(!session){hide(el("loading"));show(el("not-logged-in"));return;}
  try{
    const d=await apiGet({action:"getAll"});
    allTeams=d.teams||[];allMembers=d.members||[];allRequests=d.requests||[];settings=d.settings||{};
  }catch(e){loadDemo();}
  hide(el("loading"));show(el("content"));
  render();
});

function loadDemo(){
  allTeams=[{id:"t1",name:"Shadow Protocol",captainId:"m1",captainName:"Alex Chen",status:"open",memberCount:2,composition:["Tank","DPS","DPS","Support"],description:"Competitive daily scrims.",minPower:1800000,minLevel:50,playstyle:"Competitive"}];
  allMembers=[
    {id:"m1",name:"Alex Chen",gamertag:"ShadowAce#1234",captainKey:"demo-key-alex",teamIds:["t1"],isCaptain:"TRUE",class:"Duelist",tier:"T2",power:2100000,level:60},
    {id:"m4",name:"Taylor Kim",gamertag:"TK_Radiant#777",captainKey:"demo-key-tk",teamIds:["t1"],isCaptain:"FALSE",class:"Knight",tier:"T2",power:1900000,level:55},
  ];
  allRequests=[];
  if(!session)session={id:"m1",gamertag:"ShadowAce#1234",isCaptain:true,captainKey:"demo-key-alex"};
}

function render(){
  const me = allMembers.find(m=>m.id===session.id)||{teamIds:[]};
  const myTeams = allTeams.filter(t=>(me.teamIds||[]).includes(t.id));
  const maxSize = Number(settings.maxTeamSize)||4;

  if(!myTeams.length){
    el("content").innerHTML=`<div class="empty">
      <div class="empty-icon">🛡️</div>
      <h3>You're currently not in any team.</h3>
      <p>Join an existing team or start your own — your teammates are out there.</p>
      <div class="empty-actions">
        <a href="index.html" class="btn btn-primary">View Current Teams</a>
        <a href="create-team.html" class="btn btn-ghost">Start Your Own Team</a>
      </div>
    </div>`;
    return;
  }

  el("content").innerHTML=`
    <div class="section-title mb-lg">Your Teams (${myTeams.length})</div>
    ${myTeams.map(t=>{
      const members=allMembers.filter(m=>(m.teamIds||[]).includes(t.id));
      const isCaptain=t.captainId===session.id;
      return `<div class="card mb-lg" id="team-card-${t.id}">
        <div class="flex-between mb-md">
          <div>
            <div style="font-size:1.1rem;font-weight:600;">${esc(t.name)}</div>
            <div class="text-xs text-muted">Captain: ${esc(t.captainName||"—")} · ${members.length}/${maxSize} members</div>
          </div>
          <div class="flex gap-xs flex-wrap">
            <a href="team.html?id=${t.id}" class="btn btn-ghost btn-sm">Team Profile</a>
            ${isCaptain?`<button class="btn btn-amber btn-sm" onclick="openTransfer('${t.id}')">Transfer Captaincy</button>`:""}
            <button class="btn btn-danger btn-sm" onclick="confirmLeave('${t.id}','${esc(t.name)}')">Leave</button>
          </div>
        </div>

        <!-- Roster -->
        <div class="section-title mb-sm">Roster</div>
        <div class="roster-list mb-md">
          ${members.map(m=>{
            const isCap=m.id===t.captainId;
            return `<div class="roster-row">
              <div class="roster-info">
                <a href="profile.html?id=${m.id}"><div class="avatar avatar-sm">${initials(m.name)}</div></a>
                <div>
                  <div class="flex-center gap-xs">
                    <a href="profile.html?id=${m.id}" class="font-semibold text-sm">${esc(m.name)}</a>
                    ${isCap?`<span class="badge badge-captain">Captain</span>`:""}
                  </div>
                  <div class="roster-meta">${esc(m.gamertag)}${m.class?" · "+esc(CLASS_ICONS[m.class]||"")+" "+esc(m.class):""}${m.power?" · ⚡"+formatPower(m.power):""}${m.level?" · Lv."+esc(String(m.level)):""}</div>
                </div>
              </div>
              ${isCaptain&&!isCap?`<button class="btn btn-danger btn-xs" onclick="confirmKick('${t.id}','${m.id}','${esc(m.name)}')">Kick</button>`:""}
            </div>`;
          }).join("")}
          ${Array.from({length:maxSize-members.length},()=>`<div class="roster-row" style="opacity:0.4;border-style:dashed;">
            <div class="roster-info"><div class="pip pip-empty"></div><span class="text-xs text-muted">Open slot</span></div>
          </div>`).join("")}
        </div>

        <!-- Formation -->
        <div class="section-title mb-sm">Battle Formation</div>
        <div id="fg-${t.id}"></div>

        <!-- Team Strategy builds -->
        <div class="section-title mb-md mt-lg">Team Builds</div>
        ${members.map(m=>{
          const myBuild=m.teamBuild||{techniques:[],charms:[]};
          const bmId=`bm-${t.id}-${m.id}`;
          return `<div class="card card-sm mb-sm">
            <div class="flex-between mb-sm">
              <div class="font-semibold text-sm">${esc(m.name)} ${m.class?`<span class="badge badge-captain">${esc(m.class)}</span>`:""}</div>
              ${m.id===session.id?`<button class="btn btn-primary btn-xs" onclick="saveMemberBuild('${t.id}','${m.id}')">Save Build</button>`:""}
            </div>
            <div id="${bmId}"></div>
          </div>`;
        }).join("")}
      </div>`;
    }).join("")}
  `;

  // Mount formations and builds
  myTeams.forEach(t=>{
    const members=allMembers.filter(m=>(m.teamIds||[]).includes(t.id));
    const isCaptain=t.captainId===session.id;

    new FormationGrid({
      containerId:`fg-${t.id}`,
      members:members.map(m=>({id:m.id,name:m.name,class:m.class||""})),
      positions:t.formation||{},
      readOnly:!isCaptain,
      onSave:isCaptain?pos=>saveFormation(t.id,pos):null,
    }).mount();

    members.forEach(m=>{
      const bmId=`bm-${t.id}-${m.id}`;
      const bm=new BuildMaker({
        containerId:bmId,
        currentClass:m.class||"",
        readOnly:m.id!==session.id,
        maxTechniques:6,maxCharms:6,
      }).mount();
      const b=m.teamBuild||{techniques:[],charms:[]};
      bm.load(b.techniques||[],b.charms||[]);
      window[`_save_bm_${t.id}_${m.id}`]=()=>bm.getBuild();
    });
  });
}

async function saveMemberBuild(teamId,memberId){
  confirm_("Save Team Build","Save your build for this team's strategy board?",async()=>{
    const fn=window[`_save_bm_${teamId}_${memberId}`];
    if(!fn)return;
    const build=fn();
    try{
      await apiPost({action:"updateTeamBuild",memberId:session.id,captainKey:session.captainKey,teamId,build:JSON.stringify(build)});
      toast("Build saved to team board!");
    }catch(e){toast(e.message,"error");}
  },false);
}

async function saveFormation(teamId,positions){
  try{
    await apiPost({action:"updateFormation",captainId:session.id,captainKey:session.captainKey,teamId,formation:JSON.stringify(positions)});
    toast("Formation saved!");
  }catch(e){toast(e.message,"error");}
}

function openTransfer(teamId){
  const team=allTeams.find(t=>t.id===teamId);
  const members=allMembers.filter(m=>(m.teamIds||[]).includes(teamId)&&m.id!==session.id);
  if(!members.length){toast("No other members to transfer to.","amber");return;}
  const name=prompt(`Transfer captaincy of "${team?.name}".\nEnter the Player ID of the new captain:\n${members.map(m=>m.gamertag).join(", ")}`);
  if(!name)return;
  const target=members.find(m=>m.gamertag.toLowerCase()===name.toLowerCase());
  if(!target){toast("Player not found in team.","error");return;}
  confirm_("Transfer Captaincy",`Transfer captain role to ${target.name}? You will become a regular member.`,async()=>{
    try{
      await apiPost({action:"transferCaptaincy",captainId:session.id,captainKey:session.captainKey,teamId,newCaptainId:target.id});
      toast("Captaincy transferred!");
      const t=allTeams.find(x=>x.id===teamId);if(t){t.captainId=target.id;t.captainName=target.name;}
      render();
    }catch(e){toast(e.message,"error");}
  });
}

function confirmLeave(teamId,teamName){
  confirm_(`Leave ${teamName}`,"Are you sure? If you are the sole captain with members, you must transfer captaincy first.",async()=>{
    try{
      await apiPost({action:"leaveTeam",memberId:session.id,captainKey:session.captainKey,teamId});
      const me=allMembers.find(m=>m.id===session.id);if(me)me.teamIds=(me.teamIds||[]).filter(id=>id!==teamId);
      toast("Left team.");render();
    }catch(e){toast(e.message,"error");}
  });
}

function confirmKick(teamId,memberId,memberName){
  confirm_(`Kick ${memberName}`,`Remove ${memberName} from the team?`,async()=>{
    try{
      await apiPost({action:"kickMember",captainId:session.id,captainKey:session.captainKey,teamId,targetId:memberId});
      const m=allMembers.find(x=>x.id===memberId);if(m)m.teamIds=(m.teamIds||[]).filter(id=>id!==teamId);
      toast(`${memberName} removed from team.`);render();
    }catch(e){toast(e.message,"error");}
  });
}
</script>
</body>
</html>
