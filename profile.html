<script>
// Inline timeout - independent of app.js loading
// If page is still loading after 15s, show error
var _loadTimeout = setTimeout(function() {
  var ld = document.getElementById("loading");
  var pc = document.getElementById("profile-content");
  if (ld && ld.style.display !== "none" && !ld.classList.contains("hidden")) {
    if (ld) ld.style.display = "none";
    if (pc) {
      pc.style.display = "block";
      pc.innerHTML = "<div class=\"empty\"><div class=\"empty-icon\">⏱️</div>" +
        "<p style=\"color:var(--red);font-weight:600;\">Page timed out loading</p>" +
        "<p style=\"font-size:0.82rem;color:var(--text2);margin:0.5rem 0;\">The server is taking too long to respond.</p>" +
        "<button class=\"btn btn-primary\" onclick=\"location.reload()\">Try Again</button></div>";
    }
  }
}, 15000);
</script>
  <div id="profile-content"></div>
</main>

<script>
let profileMember = null;
let allTeams = [], allMembers = [], settings = {};

onReady(async () => {
  const params = new URLSearchParams(location.search);
  const memberId = params.get("id");
  if (!memberId) { renderError("No profile ID specified."); return; }

  try {
    const d = await apiGet({ action: "getAll" });
    allTeams   = d.teams   || [];
    allMembers = d.members || [];
    settings   = d.settings || {};
    profileMember = allMembers.find(m => m.id === memberId);
    // Parse pvpBuild if it came back as a string
    if (profileMember && typeof profileMember.pvpBuild === "string" && profileMember.pvpBuild) {
      try { profileMember.pvpBuild = JSON.parse(profileMember.pvpBuild); } catch { profileMember.pvpBuild = {techniques:[],charms:[]}; }
    }
    // Sync avatarUrl and pvpFantomon into session if viewing own profile
    const session = getSession();
    if (session && profileMember && session.id === profileMember.id) {
      let changed = false;
      if (profileMember.avatarUrl && session.avatarUrl !== profileMember.avatarUrl) {
        session.avatarUrl = profileMember.avatarUrl; changed = true;
      }
      if (profileMember.pvpFantomon && session.pvpFantomon !== profileMember.pvpFantomon) {
        session.pvpFantomon = profileMember.pvpFantomon; changed = true;
      }
      if (changed) setSession(session);
    }
  } catch(e) {
    // API failed — show diagnostic message instead of infinite spinner
    hide(el("loading"));
    show(el("profile-content"));
    el("profile-content").innerHTML = `<div class="empty">
      <div class="empty-icon">⚠️</div>
      <p style="color:var(--red);font-weight:600;">Failed to load profile</p>
      <p style="font-size:0.82rem;color:var(--text2);margin:0.5rem 0;">\${e.message}</p>
      <button class="btn btn-ghost mt-md" onclick="location.reload()">Try Again</button>
    </div>`;
    return;
  }

  if (!profileMember) { renderError("Member not found."); return; }

  // Load build-maker.js dynamically (non-blocking) then render
  if (typeof SKILLS === "undefined") {
    const bms = document.createElement("script");
    bms.src = "js/build-maker.js?v=2026061403";
    bms.onload = function() {
      hide(el("loading"));
      show(el("profile-content"));
      renderProfile();
      populateEditModal();
    };
    bms.onerror = function() {
      // build-maker failed - render without skill data
      window.SKILLS = [];
      hide(el("loading"));
      show(el("profile-content"));
      renderProfile();
      populateEditModal();
    };
    document.head.appendChild(bms);
  } else {
    hide(el("loading"));
    show(el("profile-content"));
    renderProfile();
    populateEditModal();
  }
});

function demoMember() {
  return {
    id:"m1", name:"Test User", gamertag:"Test#0001",
    tier:"T2", class:"Duelist", power:1900000, level:55,
    bio:"Testing.", description:"Test account.", playstyle:"Competitive",
    discordId:"", discordName:"", timezone:"UTC-05:00 (EST)",
    languages:"English", prefLanguage:"English",
    lookingForTeam:"TRUE", isCaptain:"FALSE", teamIds:[],
    pvpBuild:{ techniques:[], charms:[] }, avatarUrl:"",
  };
}

// ── Render profile ────────────────────────────────────────
function renderProfile() {
  const m = profileMember;
  const session = getSession();
  const isOwn = session && session.id === m.id;
  const teamsList    = allTeams.filter(t => (m.teamIds||[]).includes(t.id));
  const captainTeams = allTeams.filter(t => t.captainId === m.id);
  const languages    = (m.languages||"").split(",").filter(Boolean);
  const maxTeams     = Number(settings.maxMemberTeams) || 3;
  const atLimit      = (m.teamIds||[]).length >= maxTeams;
  const isLFT        = String(m.lookingForTeam).toUpperCase() === "TRUE";

  el("profile-content").innerHTML = `
    <!-- Hero -->
    <div class="profile-hero">
      <div style="position:relative;flex-shrink:0;">
        ${m.avatarUrl
          ? `<img src="${esc(m.avatarUrl)}" alt="${esc(m.name)}"
              style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--blue-mid);"
              onerror="this.style.display='none'" />`
          : `<div class="avatar avatar-lg">${initials(m.name)}</div>`
        }
        ${isOwn ? `<button onclick="openAvatarPicker(onAvatarSelected)"
          style="position:absolute;bottom:-4px;right:-4px;background:var(--blue);border:none;
            border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:0.65rem;
            display:flex;align-items:center;justify-content:center;" title="Change avatar">✏️</button>` : ""}
      </div>
      <div class="profile-info">
        <div class="profile-name">${esc(m.name)}</div>
        <div class="profile-id"><span style="color:var(--text3);font-size:0.72rem;">Player ID:</span> ${esc(m.gamertag)}</div>
        <div class="profile-badges">
          ${m.tier && m.class ? `<span class="badge badge-captain">${esc(CLASS_ICONS[m.class]||"")} ${esc(m.class)} (${esc(m.tier)})</span>` : ""}
          ${m.isCaptain==="TRUE" ? `<span class="badge badge-amber">⚜️ Captain</span>` : ""}
          ${m.discordId ? `<span class="badge badge-info" style="font-size:0.67rem;">💬 Has Discord</span>` : `<span class="badge" style="background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-size:0.67rem;">💬 No Discord</span>`}
          ${isLFT ? `<span class="badge badge-lfg"><span class="badge-dot"></span>Looking for Team</span>` : ""}
          ${m.playstyle ? `<span class="badge badge-${m.playstyle==='Competitive'?'competitive':'casual'}">${esc(m.playstyle)}</span>` : ""}
          ${String(m.lookingForCaptainRole).toUpperCase()==="TRUE" ? `<span class="badge badge-amber">⚜️ Wants to Captain</span>` : ""}
          ${atLimit && isOwn ? `<span class="badge badge-full">Team Limit Reached</span>` : ""}
        </div>
        <div class="tags-row mb-sm">
          ${m.power ? `<span class="tag tag-power">⚡ ${formatPower(m.power)}</span>` : ""}
          ${m.level ? `<span class="tag tag-level">🎯 Level ${esc(String(m.level))}</span>` : ""}
          ${m.timezone ? `<span class="tag">🕐 ${esc(m.timezone)}</span>` : ""}
          ${m.prefLanguage ? `<span class="tag">🌐 ${esc(m.prefLanguage)}</span>` : ""}
        </div>
        ${m.bio        ? `<div class="profile-bio mb-sm"><strong>Playstyle:</strong> ${esc(m.bio)}</div>` : ""}
        ${m.description? `<div class="profile-bio"><strong>About:</strong> ${esc(m.description)}</div>` : ""}
      </div>
      <div class="flex-col gap-xs" style="flex-shrink:0;">
        ${isOwn ? `<button class="btn btn-ghost btn-sm" onclick="openEditModal()">Edit Profile</button>` : ""}
${isOwn ? `
          <div class="toggle-row" style="min-width:190px;margin-bottom:6px;">
            <div><div class="toggle-label" style="font-size:0.78rem;">Looking for Team</div></div>
            <label class="toggle"><input type="checkbox" id="lft-toggle" ${isLFT ? "checked" : ""} onchange="toggleLFT(this.checked)" /><span class="slider"></span></label>
          </div>
          <div class="toggle-row" style="min-width:190px;">
            <div><div class="toggle-label" style="font-size:0.78rem;">Wants to Captain</div></div>
            <label class="toggle"><input type="checkbox" id="lfc-toggle" ${String(m.lookingForCaptainRole).toUpperCase()==="TRUE" ? "checked" : ""} onchange="toggleLFC(this.checked)" /><span class="slider"></span></label>
          </div>` : ""}
        ${atLimit && isOwn ? `<div class="alert alert-amber" style="font-size:0.75rem;padding:6px 10px;margin:0;">
          You've reached your team limit (${maxTeams}). Leave a team to join another.</div>` : ""}
      </div>
    </div>

    <div class="two-col" style="align-items:start;">
      <div>
        ${m.discordId || languages.length ? `
        <div class="card mb-md">
          <div class="section-title mb-sm">Communication</div>
          ${m.discordId ? `
            <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;margin-bottom:6px;">
              <div style="font-size:0.68rem;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;">💬 Discord</div>
              <div class="text-sm">${esc(m.discordId)}${m.discordName?` <span style="color:var(--text3);">(${esc(m.discordName)})</span>`:""}</div>
            </div>` : ""}
          ${languages.length ? `
            <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;">
              <div style="font-size:0.68rem;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">🗣️ Languages</div>
              <div style="display:flex;gap:5px;flex-wrap:wrap;">
                ${languages.map(l=>`<span style="font-size:0.75rem;padding:2px 10px;border-radius:4px;background:var(--blue-dim);border:1px solid var(--blue-mid);color:var(--blue-bright);">${esc(l)}</span>`).join("")}
              </div>
            </div>` : ""}
        </div>` : ""}

        <div class="card mb-md">
          <div class="section-title mb-sm">Current Teams</div>
          ${teamsList.length ? teamsList.map(t => {
            const teamMembers = allMembers.filter(m => (m.teamIds||[]).includes(t.id));
            const maxSize = Number(settings.maxTeamSize)||4;
            const lineupIcons = Array.from({length: maxSize}, (_,i) => {
              const tm = teamMembers[i];
              if (!tm) return `<div class="pip pip-empty" title="Open slot"></div>`;
              const av = tm.avatarUrl
                ? `<img src="${esc(tm.avatarUrl)}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid var(--blue-mid);" onerror="this.style.display='none'" title="${esc(tm.name)}" />`
                : `<div class="avatar avatar-xs" title="${esc(tm.name)}">${initials(tm.name)}</div>`;
              return `<a href="profile.html?id=${tm.id}" onclick="event.stopPropagation();" title="${esc(tm.name)}">${av}</a>`;
            }).join("");
            const isCap = m.id === t.captainId;
            const comp = t.composition ? (Array.isArray(t.composition)?t.composition:String(t.composition).split(",").filter(Boolean)) : [];
            const compPills = comp.map(r=>`<span class="comp-pill comp-${r.toLowerCase()}">${r}</span>`).join("");
            const capMember = allMembers.find(x=>x.id===t.captainId);
            const capAv = capMember?.avatarUrl
              ? `<img src="${esc(capMember.avatarUrl)}" style="width:16px;height:16px;border-radius:50%;object-fit:cover;border:1px solid var(--amber-mid);" onerror="this.style.display='none'" />`
              : `<div style="width:16px;height:16px;border-radius:50%;background:var(--amber-dim);border:1px solid var(--amber-mid);display:flex;align-items:center;justify-content:center;font-size:0.45rem;color:var(--amber);">${(t.captainName||"?")[0]}</div>`;
            const capClass = capMember?.class ? ` · ${esc(CLASS_ICONS[capMember.class]||"")} ${esc(capMember.class)}` : "";
            return `<div style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1rem;margin-bottom:0.75rem;">
              <div class="flex-between mb-sm">
                <div>
                  <div style="font-size:0.95rem;font-weight:700;margin-bottom:3px;">${esc(t.name)}
                    ${isCap?'<span class="badge badge-captain" style="margin-left:6px;font-size:0.62rem;">⚜️ You&#39;re the Captain</span>':""}
                  </div>
                  <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;">
                    <span style="font-size:0.62rem;color:var(--amber);">⚜️ Team Captain</span>
                    ${capAv}
                    <span style="font-size:0.7rem;color:var(--amber);">${esc(t.captainName||"—")}${capClass}</span>
                  </div>
                  ${compPills ? `<div class="comp-row" style="margin-bottom:6px;">${compPills}</div>` : ""}
                  <div style="display:flex;gap:5px;align-items:center;">${lineupIcons}</div>
                </div>
                <a href="team.html?id=${t.id}" class="btn btn-ghost btn-sm" style="flex-shrink:0;">Visit Team Page</a>
              </div>
            </div>`;
          }).join("") : `<div class="empty" style="padding:1rem 0;">
              <p class="text-sm text-muted" style="margin-bottom:0.75rem;">Not in any teams yet.</p>
              <div class="flex gap-sm flex-wrap">
                <a href="index.html" class="btn btn-primary btn-sm">Find a Team</a>
                <a href="create-team.html" class="btn btn-ghost btn-sm">Start Your Own</a>
              </div>
            </div>`}
        </div>

        ${m.isCaptain==="TRUE" ? `
        <div class="card">
          <div class="section-title mb-sm">Captained Teams</div>
          ${captainTeams.length ? captainTeams.map(t => `
            <div class="status-card mb-sm">
              <div class="flex-between">
                <div>
                  <div class="status-card-name">${esc(t.name)}</div>
                  <div class="comp-row mt-sm">${renderComposition(t.composition)}</div>
                </div>
                <a href="team.html?id=${t.id}" class="btn btn-ghost btn-sm">Manage</a>
              </div>
            </div>`).join("") : `<p class="text-sm text-muted">No teams captained yet. <a href="create-team.html">Create one →</a></p>`}
        </div>` : ""}
      </div>

      <!-- Right column: PVP Build + Fantomon -->
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div class="card">
          <div class="flex-between mb-md">
            <div class="section-title">PVP Build</div>
            ${isOwn ? `<button class="btn btn-ghost btn-sm" onclick="openBuildModal()">Edit Build</button>` : ""}
          </div>
          <div id="build-display"></div>
        </div>

        <!-- Fantomon PVP companion -->
        <div class="card">
          <div class="flex-between mb-md">
            <div class="section-title">PVP Fantomon</div>
            ${isOwn ? `<button class="btn btn-ghost btn-sm" onclick="openFantomonPicker()">Change</button>` : ""}
          </div>
          ${m.pvpFantomon ? `
            <div style="display:flex;align-items:center;gap:12px;">
              <img src="${esc(AVATAR_PRESETS.find(p=>p.id===m.pvpFantomon)?.url||'')}"
                style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--blue-mid);"
                onerror="this.style.display='none'" />
              <div>
                <div style="font-weight:600;font-size:0.9rem;">${esc(AVATAR_PRESETS.find(p=>p.id===m.pvpFantomon)?.label||m.pvpFantomon)}</div>
                <div class="text-xs text-muted">Active PVP Fantomon</div>
              </div>
            </div>
          ` : `<div class="empty" style="padding:1rem;"><p class="text-sm">No Fantomon selected yet.</p>
            ${isOwn ? `<button class="btn btn-ghost btn-sm mt-sm" onclick="openFantomonPicker()">Choose Fantomon</button>` : ""}
          </div>`}
        </div>
      </div>
    </div>
  `;

  renderBuildDisplay();
}

// ── Build display (read-only slots) ──────────────────────
function renderBuildDisplay() {
  const m = profileMember;
  const build = m.pvpBuild || { techniques:[], charms:[] };
  const techs  = Array.isArray(build.techniques) ? build.techniques : [];
  const charms = Array.isArray(build.charms)     ? build.charms     : [];

  const slotHtml = (ids, label) => {
    const slots = Array.from({length:4}, (_,i) => {
      const id = ids[i];
      const skill = id ? SKILLS.find(s=>s.id===id) : null;
      if (skill) {
        return `<div class="build-slot filled" title="${esc(skill.name)}" style="min-height:80px;">
          <img class="skill-icon" src="https://lootandwaifus.com/skills/swordxstaff/skill_${skill.id}.webp"
            style="width:44px;height:44px;" alt="${esc(skill.name)}" onerror="this.style.display='none'" />
          <div class="skill-name" style="font-size:0.62rem;">${esc(skill.name)}</div>
        </div>`;
      }
      return `<div class="build-slot" style="min-height:80px;">
        <div style="color:var(--text3);font-size:0.65rem;">Empty</div>
      </div>`;
    });
    return `<div class="section-title mb-sm" style="font-size:0.65rem;">${label}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem;">${slots.join("")}</div>`;
  };

  const hasAny = techs.length || charms.length;
  el("build-display").innerHTML = hasAny
    ? slotHtml(techs,"Techniques") + slotHtml(charms,"Charms")
    : `<div class="empty" style="padding:1.5rem;"><p class="text-sm">No build set yet.</p></div>`;
}

// ── LFT / LFC toggles ─────────────────────────────────────
async function toggleLFT(checked) {
  const session = getSession();
  if (!session) return;
  const maxTeams = Number(settings.maxMemberTeams) || 3;
  if (checked && (profileMember.teamIds||[]).length >= maxTeams) {
    el("lft-toggle").checked = false;
    toast("You&#39;ve reached your team limit. Leave a team before enabling LFT.", "amber");
    return;
  }
  showProcessing("Updating Looking for Team…");
  try {
    await apiPost({ action:"updateProfile", memberId:session.id, captainKey:session.captainKey,
      lookingForTeam: checked });
    profileMember.lookingForTeam = checked ? "TRUE" : "FALSE";
    renderProfile();
    hideProcessing(checked ? "Now visible to captains!" : "Removed from LFT listings.");
  } catch(e) { hideProcessing(); toast(e.message,"error"); }
}

async function toggleLFC(checked) {
  const session = getSession();
  if (!session) return;
  showProcessing("Updating Captain Preference…");
  try {
    await apiPost({ action:"updateProfile", memberId:session.id, captainKey:session.captainKey, lookingForCaptainRole: checked });
    profileMember.lookingForCaptainRole = checked ? "TRUE" : "FALSE";

// ── Avatar ────────────────────────────────────────────────
async async function onAvatarSelected(url) {

// ── Build modal ───────────────────────────────────────────
let bmState = { techniques:[], charms:[], activeTab:"technique", activeSlot:null };

function openBuildModal() {
  const build = profileMember.pvpBuild || { techniques:[], charms:[] };
  bmState.techniques = [...(build.techniques||[])];
  bmState.charms     = [...(build.charms||[])];
  bmState.activeTab  = "technique";
  bmState.activeSlot = null;
  bmRenderSlots();
  hide(el("bm-browser-wrap"));
  el("build-modal").classList.add("open");
}

function closeBuildModal() { el("build-modal").classList.remove("open"); }

function bmRenderSlots() {
  const renderSlots = (ids, type, containerId) => {
    const container = el(containerId);
    container.innerHTML = Array.from({length:4}, (_,i) => {
      const id = ids[i];
      const skill = id ? SKILLS.find(s=>s.id===id) : null;
      const isActive = bmState.activeSlot && bmState.activeSlot.type === type && bmState.activeSlot.index === i;
      if (skill) {
        return `<div class="build-slot filled ${isActive?"" :""}"
          style="cursor:pointer;${isActive?"border-color:var(--blue);":""}"
          onclick="bmSlotClick('${type}',${i})" title="Click to replace or remove">
          <button class="build-slot-remove" onclick="event.stopPropagation();bmClearSlot('${type}',${i})">✕</button>
          <img class="skill-icon" style="width:40px;height:40px;"
            src="https://lootandwaifus.com/skills/swordxstaff/skill_${skill.id}.webp"
            alt="${esc(skill.name)}" onerror="this.style.display='none'" />
          <div class="skill-name" style="font-size:0.62rem;">${esc(skill.name)}</div>
        </div>`;
      }
      return `<div class="build-slot" style="cursor:pointer;${isActive?"border-color:var(--blue);border-style:solid;":""}"
        onclick="bmSlotClick('${type}',${i})">
        <div style="font-size:1.4rem;opacity:0.2;">+</div>
        <div style="font-size:0.62rem;color:var(--text3);">${isActive?"Selecting…":"Empty"}</div>
      </div>`;
    }).join("");
  };
  renderSlots(bmState.techniques, "technique", "bm-technique-slots");
  renderSlots(bmState.charms,     "charm",     "bm-charm-slots");
}

function bmSlotClick(type, index) {
  // If same slot clicked again, deselect
  if (bmState.activeSlot && bmState.activeSlot.type===type && bmState.activeSlot.index===index) {
    bmState.activeSlot = null;
    hide(el("bm-browser-wrap"));
    bmRenderSlots();
    return;
  }
  bmState.activeSlot = { type, index };
  bmState.activeTab  = type;
  show(el("bm-browser-wrap"));
  bmSetTab(type);
  bmRenderSlots();
}

function bmClearSlot(type, index) {
  if (type==="technique") bmState.techniques[index] = null;
  else                    bmState.charms[index]     = null;
  bmState.activeSlot = null;
  hide(el("bm-browser-wrap"));
  bmRenderSlots();
}

function bmSetTab(tab) {
  bmState.activeTab = tab;
  el("bm-tab-technique").classList.toggle("active", tab==="technique");
  el("bm-tab-charm").classList.toggle("active",     tab==="charm");
  el("bm-search").value = "";
  bmRenderBrowser();
}

function bmRenderBrowser() {
  if (!bmState.activeSlot) return;
  const q = (el("bm-search").value||"").toLowerCase();
  const cls = profileMember.class || "";
  const skills = SKILLS.filter(s => {
    if (s.type !== bmState.activeTab) return false;
    if (cls && s.classes.length && !s.classes.includes(cls)) return false;
    if (q && !s.name.toLowerCase().includes(q)) return false;
    return true;
  });
  const selectedArr = bmState.activeTab==="technique" ? bmState.techniques : bmState.charms;
  el("bm-skill-grid").innerHTML = skills.map(s => {
    const isSel = selectedArr.includes(s.id);
    return `<div class="skill-card ${isSel?"selected":""}" onclick="bmSelectSkill('${s.id}')" title="${esc(s.name)}">
      <img class="skill-icon" src="https://lootandwaifus.com/skills/swordxstaff/skill_${s.id}.webp"
        loading="lazy" onerror="this.style.display='none'" alt="${esc(s.name)}" />
      <div class="skill-name">${esc(s.name)}</div>
    </div>`;
  }).join("") || `<div style="grid-column:1/-1;text-align:center;color:var(--text3);padding:2rem;font-size:0.82rem;">No skills found</div>`;
}

function bmSelectSkill(skillId) {
  if (!bmState.activeSlot) return;
  const { type, index } = bmState.activeSlot;
  if (type==="technique") bmState.techniques[index] = skillId;
  else                    bmState.charms[index]     = skillId;
  bmState.activeSlot = null;
  hide(el("bm-browser-wrap"));
  bmRenderSlots();
}

async function saveBuildFromModal() {
  const session = getSession();
  if (!session) return;
  const build = { techniques: bmState.techniques.filter(Boolean), charms: bmState.charms.filter(Boolean) };
  confirm_("Save PVP Build", "Confirm saving your build to your profile?", async () => {
    closeBuildModal();
    showProcessing("Saving PVP Build…");
    try {
      await apiPost({ action:"updateBuild", memberId:session.id, captainKey:session.captainKey, pvpBuild: JSON.stringify(build) });
      profileMember.pvpBuild = build;
      renderBuildDisplay();
      hideProcessing("Build saved!");
    } catch(e) { hideProcessing(); toast(e.message,"error"); }
  }, false);
}

// ── Edit profile modal ────────────────────────────────────
// ── Edit modal tag input ──────────────────────────────────
const epTagState = {};

// ── Edit modal chip-select (reuses DOM-safe pattern from register page) ───────────────
let epChipState = {};
function epChipAdd(id, select, max) {
  var val = select.value; if (!val) return;
  if (!epChipState[id]) epChipState[id] = [];
  if (epChipState[id].indexOf(val) !== -1) { select.value=""; return; }
  if (epChipState[id].length >= max) { select.value=""; return; }
  epChipState[id].push(val); select.value=""; epChipRender(id);
}
function epChipRemove(id, val) {
  if (!epChipState[id]) return;
  epChipState[id] = epChipState[id].filter(function(v){return v!==val;}); epChipRender(id);
}
function epChipRender(id) {
  var c = document.getElementById(id+"-tags"); if (!c) return; c.innerHTML="";
  (epChipState[id]||[]).forEach(function(v) {
    var span=document.createElement("span"); span.className="lang-tag";
    span.appendChild(document.createTextNode(v+" "));
    var btn=document.createElement("button"); btn.type="button"; btn.className="lang-tag-x"; btn.textContent="✕";
    (function(ci,cv){btn.onclick=function(){epChipRemove(ci,cv);};}(id,v));
    span.appendChild(btn); c.appendChild(span);
  });
}
function epChipGet(id) { return epChipState[id]?epChipState[id].slice():[]; }
function epChipSet(id, values) { epChipState[id]=Array.isArray(values)?values.slice():[]; epChipRender(id); }

function epTagInit(id, options, maxItems=3) {
  epTagState[id] = { options, selected: [], maxItems };
  epTagRenderDropdown(id);
  document.addEventListener("click", e => {
    const wrap = document.getElementById(id+"-wrap");
    if (wrap && !wrap.contains(e.target)) {
      const dd = document.getElementById(id+"-dropdown");
      if (dd) dd.classList.remove("open");
    }
  });
}
function epTagOpen(id) { epTagRenderDropdown(id); document.getElementById(id+"-dropdown").classList.add("open"); }
function epTagFilter(id) { epTagRenderDropdown(id); document.getElementById(id+"-dropdown").classList.add("open"); }
function epTagToggle(id, value) {
  const s = epTagState[id];
  const idx = s.selected.indexOf(value);
  if (idx >= 0) s.selected.splice(idx,1);
  else if (s.selected.length < s.maxItems) s.selected.push(value);
  else { toast(`Max ${s.maxItems} languages allowed`,"amber"); return; }
  epTagRenderChips(id); epTagRenderDropdown(id);
  document.getElementById(id+"-search").value = "";
  document.getElementById(id+"-search").focus();
}
function epTagRemove(id, value) {
  epTagState[id].selected = epTagState[id].selected.filter(v=>v!==value);
  epTagRenderChips(id); epTagRenderDropdown(id);
}
function epTagGet(id) { return epTagState[id]?.selected || []; }
function epTagSet(id, arr) {
  if (!epTagState[id]) return;
  epTagState[id].selected = arr.filter(Boolean).slice(0, epTagState[id].maxItems);
  epTagRenderChips(id);
}
function epTagRenderChips(id) {
  const s = epTagState[id];
  document.getElementById(id+"-tags").innerHTML = s.selected.map(v =>
    `<span class="tag-chip">${esc(v)}<button class="tag-chip-x" onclick="epTagRemove('${id}','${esc(v)}')" title="Remove">✕</button></span>`
  ).join("");
}
function epTagRenderDropdown(id) {
  const s = epTagState[id];
  const q = (document.getElementById(id+"-search")?.value||"").toLowerCase();
  const filtered = s.options.filter(o => !s.selected.includes(o) && (!q||o.toLowerCase().includes(q)));
  const dd = document.getElementById(id+"-dropdown");
  if (!dd) return;
  dd.innerHTML = filtered.length
    ? filtered.map(o=>`<div class="tag-dropdown-item" onclick="epTagToggle('${id}','${esc(o)}')">${esc(o)}</div>`).join("")
    : `<div class="tag-dropdown-empty">${s.selected.length>=s.maxItems?"Max "+s.maxItems+" selected":"No results"}</div>`;
}

function populateEditModal() {
  populateSelect("ep-timezone", TIMEZONES, "— Select —");
  buildClassSelector("ep-tier", "ep-class");
  // ep-languages and ep-pref-lang use chip selects (no init needed)
}

function openEditModal() {
  const m = profileMember;
  el("ep-name").value         = m.name || "";
  el("ep-tag").value          = m.gamertag || "";
  el("ep-power").value        = m.power ? formatPower(m.power) : "";
  el("ep-level").value        = m.level || "";
  el("ep-desc").value         = m.description || "";
  el("ep-playstyle").value    = m.playstyle || "";
  el("ep-discord-id").value   = m.discordId || "";
  el("ep-discord-name").value = m.discordName || "";
  el("ep-timezone").value     = m.timezone || "";
    // ep-pref-lang now populated via epChipSet above
  epChipSet("ep-languages", (m.languages||"").split(",").filter(Boolean));
  epChipSet("ep-pref-lang", (m.prefLanguage||"").split(",").filter(Boolean));
  if (m.tier) {
    el("ep-tier").value = m.tier;
    el("ep-tier").dispatchEvent(new Event("change"));
    setTimeout(() => { if (m.class) el("ep-class").value = m.class; }, 60);
  }
  clearAlert("edit-error");
  el("edit-modal").classList.add("open");
}

function closeEditModal() { el("edit-modal").classList.remove("open"); }

function confirmSave() {
  confirm_("Save Changes", "Are you sure you want to update your profile?", () => { closeEditModal(); showProcessing("Saving Profile…"); doSaveProfile(); }, false);
}

async function doSaveProfile() {
  const session = getSession();
  if (!session) return;
  clearAlert("edit-error");
  const name      = el("ep-name").value.trim();
  const tag       = el("ep-tag").value.trim();
  const tier      = el("ep-tier").value;
  const cls       = el("ep-class").value;
  const power     = parsePower(el("ep-power").value);
  const level     = el("ep-level").value.trim();
  const desc      = el("ep-desc").value.trim();
  const playstyle = el("ep-playstyle").value;
  const discId    = el("ep-discord-id").value.trim();
  const discName  = el("ep-discord-name").value.trim();
  const tz        = el("ep-timezone").value;
  // prefLang now read via epChipGet above
  const lfg = profileMember.lookingForTeam === "TRUE"; // controlled by toggle on profile
  const isCaptain = profileMember.isCaptain; // preserve existing value, not editable here
  const languages = epChipGet("ep-languages").join(",");
  const prefLangArr = epChipGet("ep-pref-lang");
  const prefLangVal = prefLangArr.join(",");
  if (!name)    { openEditModal(); showAlert("edit-error","In-Game Name is required."); return; }
  if (!tag || String(tag).length !== 12) { openEditModal(); showAlert("edit-error","Player ID must be exactly 12 digits."); return; }
  if (!tier)    { openEditModal(); showAlert("edit-error","Class Tier is required."); return; }
  if (!cls)     { openEditModal(); showAlert("edit-error","Class is required."); return; }
  if (!power)   { openEditModal(); showAlert("edit-error","Power Rating is required."); return; }
  if (!level)   { openEditModal(); showAlert("edit-error","Character Level is required."); return; }
  if (!tz)      { openEditModal(); showAlert("edit-error","Time Zone is required."); return; }
  if (!languages.length) { openEditModal(); showAlert("edit-error","Languages Spoken is required."); return; }
  if (!prefLangArr.length) { openEditModal(); showAlert("edit-error","Preferred Language is required."); return; }
  if (tag && (String(tag).length !== 12 || !/^\d{12}$/.test(String(tag)))) {
    openEditModal(); showAlert("edit-error","Player ID must be exactly 12 digits."); return;
  }
  try {
    await apiPost({ action:"updateProfile", memberId:session.id, captainKey:session.captainKey,
      name, gamertag:tag, tier, class:cls, power, level, bio:"", description:desc,
      playstyle, discordId:discId, discordName:discName, timezone:tz,
      languages, prefLanguage:prefLang, lookingForTeam:lfg, isCaptain });
    Object.assign(profileMember, { name,gamertag:tag,tier,class:cls,power,level,
      description:desc||"I'm a pretty cool person - ready to join in!",playstyle,discordId:discId,discordName:discName,timezone:tz,
      languages,prefLanguage:prefLang,
      lookingForTeam:lfg?"TRUE":"FALSE",isCaptain:isCaptain?"TRUE":"FALSE" });
    const s = getSession();
    s.gamertag=tag; s.name=name; s.isCaptain=isCaptain;
    setSession(s);
    renderProfile();
    hideProcessing("Profile updated!");
  } catch(e) {
    hideProcessing();
    openEditModal();
    showAlert("edit-error", e.message);
  }
}

function openFantomonPicker() {
  // Build a simple modal for fantomon selection
  const existing = el("fantomon-picker-modal");
  if (existing) existing.remove();

  const html = `<div class="modal-overlay open" id="fantomon-picker-modal" style="z-index:450;">
    <div class="modal" style="max-width:480px;">
      <div class="modal-title">Choose Your PVP Fantomon</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;" id="fantomon-grid">
        ${AVATAR_PRESETS.map(p=>`
          <div onclick="selectFantomon('${p.id}')" id="fp-${p.id}"
            style="cursor:pointer;border-radius:10px;border:2px solid var(--border);background:var(--surface);
              padding:10px;text-align:center;transition:border-color 0.15s;
              ${profileMember.pvpFantomon===p.id?'border-color:var(--blue);background:var(--blue-dim);':''}">
            <img src="${p.url}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;" />
          </div>`).join("")}
      </div>
      <div class="modal-actions">

  </div>`;

function selectFantomon(id) {
  window._selectedFantomon = id;
  document.querySelectorAll("#fantomon-grid > div").forEach(d => {
    d.style.borderColor = "var(--border)";
    d.style.background  = "var(--surface)";
  });
  const sel = el("fp-" + id);
  if (sel) { sel.style.borderColor = "var(--blue)"; sel.style.background = "var(--blue-dim)"; }
  const btn = el("fp-confirm");
  if (btn) btn.disabled = false;
}

async function confirmFantomon() {
  const id = window._selectedFantomon;
  if (!id) return;
  const session = getSession();
  if (!session) return;
  el("fantomon-picker-modal").remove();
  showProcessing("Saving Fantomon…");
  try {
    await apiPost({ action:"updateProfile", memberId:session.id, captainKey:session.captainKey, pvpFantomon:id });
    profileMember.pvpFantomon = id;
    renderProfile();
    hideProcessing("PVP Fantomon updated!");
  } catch(e) { hideProcessing(); toast(e.message,"error"); }
}

// showProcessing / hideProcessing from app.js global

function validateEpTag(input) {
  const val = String(input.value).replace(/\D/g,"");
  if (val.length > 12) input.value = val.slice(0,12);
  const hint = document.getElementById("ep-tag-hint");
  if (!hint) return;
  const len = String(input.value).length;
  if (len === 0) {
    hint.style.color = "var(--text3)";
    hint.textContent = "Must be exactly 12 digits.";
  } else if (len < 12) {
    hint.style.color = "var(--amber)";
    hint.textContent = `${len} / 12 digits — needs ${12 - len} more.`;
  } else {
    hint.style.color = "var(--green)";
    hint.textContent = "✓ Valid Player ID format.";
  }
}

function renderError(msg) {
  hide(el("loading"));
  show(el("profile-content"));
  el("profile-content").innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(msg)}</p></div>`;
}
