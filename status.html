<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Status — Berserk Guild</title>
<link rel="stylesheet" href="css/style.css" />
<style>
.status-block {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  margin-bottom: 1.25rem;
  overflow: hidden;
}
.status-block-header {
  background: var(--surface2);
  border-bottom: 1px solid var(--border2);
  padding: 0.75rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-block-title {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--blue-bright);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
  flex: 1;
}
.status-block-body { padding: 1rem 1.25rem; }
.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 0.875rem 1rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.5rem;
}
.status-row:last-child { margin-bottom: 0; }
.status-row-info { flex: 1; min-width: 0; }
.status-row-name { font-size: 0.92rem; font-weight: 600; margin-bottom: 2px; }
.status-row-sub  { font-size: 0.75rem; color: var(--text2); }
.status-row-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
.member-mini { display: flex; align-items: center; gap: 6px; }
.member-mini img { width:22px;height:22px;border-radius:50%;object-fit:cover;border:1px solid var(--blue-mid); }
.member-mini-fb { width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;font-size:0.5rem;font-weight:700;color:var(--blue-bright); }
.roster-pips { display:flex;gap:4px;flex-wrap:wrap;margin-top:6px; }
</style>
</head>
<body>
<script src="js/app.js"></script>
<script>onReady(() => buildNav("status.html"));</script>
<main>
  <div style="font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;">Team Status</div>

  <div id="status-loading" class="loading"><span class="spinner"></span></div>

  <div id="login-box" style="display:none;">
    <div class="card mb-md">
      <div class="form-title mb-sm">Log In to View Your Status</div>
      <p class="text-sm text-muted mb-md">Enter your credentials to view your teams, invites, and join requests.</p>
      <div class="login-row">
        <div class="field"><label>Player ID</label><input id="sl-tag" placeholder="Your Player ID" type="number" /></div>
        <div class="field"><label>Secret Key</label><input id="sl-key" type="password" placeholder="••••••••" /></div>
        <button class="btn btn-primary" onclick="doLogin()">Load Status</button>
      </div>
      <div id="sl-error" class="alert alert-error alert-hidden mt-sm"></div>
    </div>
  </div>

  <div id="status-content" style="display:none;">

    <!-- Current Teams -->
    <div class="status-block">
      <div class="status-block-header">
        <span class="status-block-title">🛡️ Current Teams</span>
        <span id="teams-count" class="count-badge"></span>
      </div>
      <div class="status-block-body" id="sc-teams"></div>
    </div>

    <!-- Incoming invites -->
    <div class="status-block">
      <div class="status-block-header">
        <span class="status-block-title">📨 Team Invites</span>
        <span id="inv-badge" class="badge badge-pending" style="display:none;"></span>
      </div>
      <div class="status-block-body" id="sc-invites"></div>
    </div>

    <!-- Outgoing join requests -->
    <div class="status-block">
      <div class="status-block-header">
        <span class="status-block-title">📤 Your Join Requests</span>
        <span id="req-badge" class="badge badge-pending" style="display:none;"></span>
      </div>
      <div class="status-block-body" id="sc-requests"></div>
    </div>

    <!-- Captain: incoming join requests -->
    <div class="status-block" id="captain-section" style="display:none;">
      <div class="status-block-header">
        <span class="status-block-title">⚜️ Join Requests to Your Team(s)</span>
        <span id="jrq-badge" class="badge badge-pending" style="display:none;"></span>
      </div>
      <div class="status-block-body" id="sc-joinreqs"></div>
    </div>

  </div>
</main>

<script>
let allTeams=[],allMembers=[],allRequests=[],settings={};
let statusMember=null;

onReady(async()=>{
  try{
    const d=await apiGet({action:"getAll"});
    allTeams=d.teams||[];allMembers=d.members||[];allRequests=d.requests||[];settings=d.settings||{};
  }catch(e){loadDemo();}
  hide(el("status-loading"));
  const session=getSession();
  if(session){
    const m=allMembers.find(mb=>mb.id===session.id);
    if(m){statusMember=m;showStatus();return;}
  }
  el("login-box").style.display="block";
});

function loadDemo(){
  allTeams=[{id:"t1",name:"Shadow Protocol",captainId:"m1",captainName:"Alex Chen",status:"open",memberCount:2,composition:["Tank","DPS","DPS","Support"]}];
  allMembers=[
    {id:"m1",name:"Alex Chen",gamertag:"1234567890",captainKey:"demo-key-alex",teamIds:["t1"],isCaptain:"TRUE",avatarUrl:""},
    {id:"m4",name:"Taylor Kim",gamertag:"0987654321",captainKey:"demo-key-tk",teamIds:[],isCaptain:"FALSE",avatarUrl:""},
  ];
  allRequests=[
    {id:"r1",type:"invite",teamId:"t1",teamName:"Shadow Protocol",fromId:"m1",toId:"m4",status:"pending"},
    {id:"r2",type:"join",teamId:"t1",teamName:"Shadow Protocol",fromId:"m4",toId:"m1",status:"pending"},
  ];
}

function doLogin(){
  const tag=el("sl-tag").value.trim(),key=el("sl-key").value.trim();
  clearAlert("sl-error");
  if(!tag||!key){showAlert("sl-error","Enter your Player ID and key.");return;}
  const m=allMembers.find(mb=>String(mb.gamertag)===tag&&mb.captainKey===key);
  if(!m){showAlert("sl-error","Player ID or key not found.");return;}
  statusMember=m;
  setSession({id:m.id,gamertag:m.gamertag,name:m.name,captainKey:m.captainKey,isCaptain:m.isCaptain,avatarUrl:m.avatarUrl||""});
  showStatus();
}

function showStatus(){hide(el("login-box"));show(el("status-content"));renderStatus();}

function memberAvatar(m, size=26){
  if(!m)return`<div class="member-mini-fb">${"?"}</div>`;
  return m.avatarUrl
    ?`<img src="${esc(m.avatarUrl)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:1px solid var(--blue-mid);" onerror="this.style.display='none'" />`
    :`<div class="member-mini-fb" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.38)}px;">${initials(m.name)}</div>`;
}

function renderStatus(){
  const m=statusMember;
  if(!m)return;
  const maxSize=Number(settings.maxTeamSize)||4;
  const teamIds=Array.isArray(m.teamIds)?m.teamIds:(m.teamIds||"").split(",").filter(Boolean);

  // ── Current Teams ──
  const memberTeams=allTeams.filter(t=>teamIds.includes(t.id));
  const teamsEl=el("sc-teams");
  const teamCount=el("teams-count");
  if(teamCount)teamCount.textContent=`${memberTeams.length} team${memberTeams.length!==1?"s":""}`;

  if(memberTeams.length){
    teamsEl.innerHTML=memberTeams.map(t=>{
      const members=allMembers.filter(mb=>{
        const mids=Array.isArray(mb.teamIds)?mb.teamIds:(mb.teamIds||"").split(",").filter(Boolean);
        return mids.includes(t.id);
      });
      const isCap=t.captainId===m.id;
      const comp=Array.isArray(t.composition)?t.composition:[];
      const compPills=comp.map(r=>`<span class="comp-pill comp-${r.toLowerCase()}">${r}</span>`).join("");
      const pips=Array.from({length:maxSize},(_,i)=>{
        const mb=members[i];
        if(!mb)return`<div class="pip pip-empty"></div>`;
        return`<a href="profile.html?id=${mb.id}" title="${esc(mb.name)}">${memberAvatar(mb,24)}</a>`;
      }).join("");

      return`<div class="status-row" style="flex-direction:column;align-items:stretch;gap:0.75rem;">
        <div class="flex-between gap-sm flex-wrap">
          <div>
            <div style="font-size:0.95rem;font-weight:700;margin-bottom:2px;">${esc(t.name)}
              ${isCap?`<span class="badge badge-captain" style="margin-left:6px;font-size:0.62rem;">⚜️ You're Captain</span>`:""}
            </div>
            <div style="font-size:0.72rem;color:var(--text2);">${members.length}/${maxSize} members</div>
            ${compPills?`<div class="comp-row mt-sm">${compPills}</div>`:""}
          </div>
          <div class="flex gap-xs flex-wrap">
            <a href="team.html?id=${t.id}" class="btn btn-ghost btn-sm">View Team</a>
            <a href="your-team.html" class="btn btn-primary btn-sm">Manage →</a>
            <button class="btn btn-danger btn-sm" onclick="confirmLeave('${t.id}','${esc(t.name)}')">Leave</button>
          </div>
        </div>
        <div class="roster-pips">${pips}</div>
      </div>`;
    }).join("");
  }else{
    teamsEl.innerHTML=`<div class="empty" style="padding:1.25rem;"><p>Not in any teams. <a href="index.html">Browse the Team Registry →</a></p></div>`;
  }

  // ── Invites ──
  const invites=allRequests.filter(r=>r.type==="invite"&&r.toId===m.id&&r.status==="pending");
  const invBadge=el("inv-badge");
  if(invites.length){
    invBadge.textContent=invites.length;show(invBadge);
    el("sc-invites").innerHTML=invites.map(r=>{
      const team=allTeams.find(t=>t.id===r.teamId);
      const capMember=team?allMembers.find(mb=>mb.id===team.captainId):null;
      const comp=Array.isArray(team?.composition)?team.composition:[];
      return`<div class="status-row">
        <div class="status-row-info">
          <div class="status-row-name">${esc(r.teamName)}</div>
          <div class="status-row-sub flex-center gap-xs mt-sm">
            ${capMember?memberAvatar(capMember,20):""}
            <span>${capMember?esc(capMember.name):"Captain"} invited you to join</span>
          </div>
          ${comp.length?`<div class="comp-row mt-sm">${comp.map(x=>`<span class="comp-pill comp-${x.toLowerCase()}">${x}</span>`).join("")}</div>`:""}
        </div>
        <div class="status-row-actions">
          <button class="btn btn-success btn-sm" onclick="respondInvite('${r.id}','accept')">Accept</button>
          <button class="btn btn-danger btn-sm"  onclick="respondInvite('${r.id}','decline')">Decline</button>
        </div>
      </div>`;
    }).join("");
  }else{
    hide(invBadge);
    el("sc-invites").innerHTML=`<p class="text-sm text-muted" style="padding:0.25rem 0;">No pending invites.</p>`;
  }

  // ── Join Requests ──
  const reqs=allRequests.filter(r=>r.type==="join"&&r.fromId===m.id&&r.status==="pending");
  const reqBadge=el("req-badge");
  if(reqs.length){
    reqBadge.textContent=reqs.length;show(reqBadge);
    el("sc-requests").innerHTML=reqs.map(r=>`<div class="status-row">
      <div class="status-row-info">
        <div class="status-row-name">${esc(r.teamName)}</div>
        <div class="status-row-sub">Awaiting captain approval</div>
      </div>
      <div class="status-row-actions">
        <button class="btn btn-danger btn-sm" onclick="cancelRequest('${r.id}')">Cancel</button>
      </div>
    </div>`).join("");
  }else{
    hide(reqBadge);
    el("sc-requests").innerHTML=`<p class="text-sm text-muted" style="padding:0.25rem 0;">No pending requests.</p>`;
  }

  // ── Captain section ──
  const capTeams=allTeams.filter(t=>t.captainId===m.id);
  const capSection=el("captain-section");
  if(capTeams.length){
    show(capSection);
    const capReqs=allRequests.filter(r=>r.type==="join"&&capTeams.map(t=>t.id).includes(r.teamId)&&r.status==="pending");
    const jrqBadge=el("jrq-badge");
    if(capReqs.length){
      jrqBadge.textContent=capReqs.length;show(jrqBadge);
      el("sc-joinreqs").innerHTML=capReqs.map(r=>{
        const ap=allMembers.find(mb=>mb.id===r.fromId)||{name:"Unknown",gamertag:"",class:"",power:"",level:"",avatarUrl:""};
        return`<div class="status-row">
          <div class="status-row-info">
            <div class="flex-center gap-sm mb-sm">
              ${memberAvatar(ap,32)}
              <div>
                <div class="status-row-name">${esc(ap.name)}</div>
                <div class="status-row-sub">${esc(ap.gamertag||"")}${ap.class?" · "+esc(CLASS_ICONS[ap.class]||"")+" "+esc(ap.class):""}${ap.power?" · ⚡"+formatPower(ap.power):""}${ap.level?" · Lv."+esc(String(ap.level)):""}</div>
              </div>
            </div>
            <div class="status-row-sub">Requesting to join <strong>${esc(r.teamName)}</strong></div>
          </div>
          <div class="status-row-actions">
            <button class="btn btn-success btn-sm" onclick="respondJoin('${r.id}','accept')">Accept</button>
            <button class="btn btn-danger btn-sm"  onclick="respondJoin('${r.id}','decline')">Decline</button>
          </div>
        </div>`;
      }).join("");
    }else{
      hide(jrqBadge);
      el("sc-joinreqs").innerHTML=`<p class="text-sm text-muted" style="padding:0.25rem 0;">No pending join requests.</p>`;
    }
  }else{hide(capSection);}
}

async function respondInvite(reqId,decision){
  const session=getSession();if(!session)return;
  try{
    await apiPost({action:"respondInvite",memberId:session.id,captainKey:session.captainKey,requestId:reqId,decision});
    const r=allRequests.find(x=>x.id===reqId);
    if(r){r.status=decision==="accept"?"accepted":"declined";
    if(decision==="accept"){statusMember.teamIds=[...(statusMember.teamIds||[]),r.teamId];}}
    renderStatus();toast(decision==="accept"?"Joined team!":"Invite declined.");
  }catch(e){toast(e.message,"error");}
}
async function respondJoin(reqId,decision){
  const session=getSession();if(!session)return;
  try{
    await apiPost({action:"respondJoinRequest",captainId:session.id,captainKey:session.captainKey,requestId:reqId,decision});
    const r=allRequests.find(x=>x.id===reqId);if(r)r.status=decision==="accept"?"accepted":"declined";
    renderStatus();toast(decision==="accept"?"Member added!":"Request declined.");
  }catch(e){toast(e.message,"error");}
}
async function cancelRequest(reqId){
  const session=getSession();if(!session)return;
  try{
    await apiPost({action:"cancelRequest",memberId:session.id,captainKey:session.captainKey,requestId:reqId});
    const idx=allRequests.findIndex(x=>x.id===reqId);if(idx>=0)allRequests.splice(idx,1);
    renderStatus();toast("Request cancelled.");
  }catch(e){toast(e.message,"error");}
}
function confirmLeave(teamId,teamName){
  confirm_(`Leave ${teamName}`,"Are you sure?",async()=>{
    const session=getSession();if(!session)return;
    try{
      await apiPost({action:"leaveTeam",memberId:session.id,captainKey:session.captainKey,teamId});
      statusMember.teamIds=(statusMember.teamIds||[]).filter(id=>id!==teamId);
      renderStatus();toast("Left team.");
    }catch(e){toast(e.message,"error");}
  });
}
</script>
</body>
</html>
