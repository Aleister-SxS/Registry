<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Invites — Berserk Guild</title>
<link rel="stylesheet" href="css/style.css?v=2026061901" />
<style>
.status-block{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:1.25rem;overflow:hidden;}
.status-block-header{background:var(--surface2);border-bottom:1px solid var(--border2);padding:0.75rem 1.25rem;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.status-block-header:hover{background:var(--surface3);}
.status-chevron{color:var(--text3);font-size:0.75rem;margin-left:auto;transition:transform 0.2s;}
.status-block.collapsed .status-chevron{transform:rotate(-90deg);}
.status-block.collapsed .status-block-body{display:none;}
.status-block-title{font-family:var(--mono);font-size:0.72rem;color:var(--blue-bright);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;flex:1;}
.status-block-body{padding:1rem 1.25rem;}
.status-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:0.875rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:0.5rem;transition:opacity 0.2s;}
.status-row:last-child{margin-bottom:0;}
.status-row-info{flex:1;min-width:0;}
.status-row-name{font-size:0.92rem;font-weight:600;margin-bottom:2px;}
.status-row-sub{font-size:0.75rem;color:var(--text2);}
.status-row-actions{display:flex;gap:0.5rem;flex-shrink:0;}
.status-empty{text-align:center;padding:1.5rem;color:var(--text3);font-size:0.84rem;}
.status-empty-icon{font-size:1.5rem;margin-bottom:0.4rem;opacity:0.4;}
/* ── Inline action feedback ──────────────────────────────────── */
.status-row-feedback{flex:1;display:flex;align-items:center;gap:8px;padding:0 0.25rem;font-size:0.88rem;}
/* ── Activity pills ──────────────────────────────────────────── */
.act-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:0.65rem;font-weight:700;letter-spacing:0.04em;vertical-align:middle;margin-left:4px;}
.act-pill-new{background:var(--amber-dim);border:1px solid var(--amber-mid);color:var(--amber);}
.act-pill-accepted{background:var(--green-dim);border:1px solid var(--green-mid);color:var(--green);}
.act-pill-declined{background:var(--red-dim);border:1px solid var(--red-mid);color:var(--red);}
.act-pill-cancelled{background:var(--surface3);border:1px solid var(--border2);color:var(--text3);}
.act-row{display:flex;align-items:flex-start;gap:10px;padding:0.75rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:0.5rem;}
.act-row:last-child{margin-bottom:0;}
.act-row-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
.act-row-body{flex:1;min-width:0;}
.act-row-main{font-size:0.84rem;line-height:1.4;}
.act-row-time{font-size:0.7rem;color:var(--text3);margin-top:2px;}
</style>
</head>
<body>
<script src="js/app.js?v=2026061901"></script>
<script>onReady(()=>buildNav("invites.html"));</script>
<main>
  <div style="font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;">Your Invites</div>

  <div id="status-loading" class="loading"><span class="spinner"></span></div>

  <div id="login-box" style="display:none;">
    <div class="card mb-md">
      <div class="form-title mb-sm">Log In to View Your Invites</div>
      <p class="text-sm text-muted mb-md">Enter your credentials to view your pending invites and join requests.</p>
      <div class="login-row">
        <div class="field"><label>Player ID</label><input id="sl-tag" placeholder="Your Player ID" type="number" /></div>
        <div class="field"><label>Secret Key</label><input id="sl-key" type="password" placeholder="••••••••" /></div>
        <button class="btn btn-primary" onclick="doLogin()">Load</button>
      </div>
      <div id="sl-error" class="alert alert-error alert-hidden mt-sm"></div>
    </div>
  </div>

  <div id="status-content" style="display:none;">

    <!-- Team Invites -->
    <div class="status-block" id="invites-block">
      <div class="status-block-header" onclick="toggleStatusBlock('invites-block')">
        <span class="status-block-title">📨 Team Invites</span>
        <span id="inv-badge" class="badge badge-pending" style="display:none;"></span>
        <span class="status-chevron">▼</span>
      </div>
      <div class="status-block-body" id="sc-invites"></div>
    </div>

    <!-- Your Join Requests -->
    <div class="status-block" id="requests-block">
      <div class="status-block-header" onclick="toggleStatusBlock('requests-block')">
        <span class="status-block-title">📤 Your Join Requests</span>
        <span id="req-badge" class="badge badge-pending" style="display:none;"></span>
        <span class="status-chevron">▼</span>
      </div>
      <div class="status-block-body" id="sc-requests"></div>
    </div>

    <!-- Captain: Join Requests to Your Teams -->
    <div class="status-block" id="captain-section">
      <div class="status-block-header" onclick="toggleStatusBlock('captain-section')">
        <span class="status-block-title">⚜️ Join Requests to Your Team(s)</span>
        <span id="jrq-badge" class="badge badge-pending" style="display:none;"></span>
        <span class="status-chevron">▼</span>
      </div>
      <div class="status-block-body" id="sc-joinreqs"></div>
    </div>

    <!-- Recent Activity -->
    <div class="status-block" id="activity-block">
      <div class="status-block-header" onclick="toggleStatusBlock('activity-block')">
        <span class="status-block-title">🕐 Recent Activity</span>
        <span id="act-badge" class="badge badge-pending" style="display:none;"></span>
        <span class="status-chevron">▼</span>
      </div>
      <div class="status-block-body" id="sc-activity"></div>
    </div>

  </div>
</main>

<script>
let allTeams=[],allMembers=[],allRequests=[],settings={};

function toggleStatusBlock(id){
  const block=document.getElementById(id);
  if(block)block.classList.toggle("collapsed");
}
let statusMember=null;

onReady(async()=>{
  try{
    const d=await apiGet({action:"getAll"});
    allTeams=d.teams||[];allMembers=d.members||[];allRequests=d.requests||[];settings=d.settings||{};
  }catch(e){}
  hide(el("status-loading"));
  const session=getSession();
  if(session){
    const m=allMembers.find(mb=>mb.id===session.id);
    if(m){statusMember=m;showStatus();return;}
  }
  el("login-box").style.display="block";
});

async function doLogin(){
  const tag=el("sl-tag").value.trim(),key=el("sl-key").value.trim();
  clearAlert("sl-error");
  if(!tag||!key){showAlert("sl-error","Enter your Player ID and key.");return;}
  const btn=document.querySelector("#login-box .btn-primary");
  if(btn){btn.disabled=true;btn.textContent="Loading…";}
  try{
    // Verify credentials server-side — captainKey is no longer in the public getAll response
    const d=await apiPost({action:"loginMember",gamertag:tag,captainKey:key});
    const remote=d.member;
    // Merge with allMembers data (richer, but no captainKey after security fix)
    statusMember=allMembers.find(mb=>mb.id===remote.id)||remote;
    setSession({id:remote.id,gamertag:remote.gamertag,name:remote.name,
      captainKey:key,isCaptain:remote.isCaptain,avatarUrl:remote.avatarUrl||""});
    showStatus();
  }catch(e){
    showAlert("sl-error",e.message||"Player ID or key not found.");
  }finally{
    if(btn){btn.disabled=false;btn.textContent="Load";}
  }
}

function showStatus(){hide(el("login-box"));show(el("status-content"));renderStatus();}

function memberAvatar(m,size=26){
  if(!m)return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*0.38)}px;color:var(--blue-bright);">?</div>`;
  return m.avatarUrl
    ?`<img src="${esc(m.avatarUrl)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:1px solid var(--blue-mid);" onerror="this.style.display='none'" />`
    :`<div style="width:${size}px;height:${size}px;border-radius:50%;background:var(--surface2);border:1px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:${Math.floor(size*0.38)}px;font-weight:700;color:var(--blue-bright);">${initials(m.name)}</div>`;
}

// ── Seen-activity tracking (localStorage) ────────────────────
function getSeenActivity(memberId){
  try{return JSON.parse(localStorage.getItem("inv_seen_"+memberId))||[];}
  catch{return[];}
}
function markActivitySeen(memberId,ids){
  try{
    const seen=getSeenActivity(memberId);
    localStorage.setItem("inv_seen_"+memberId,JSON.stringify([...new Set([...seen,...ids])]));
  }catch{}
}

// ── Relative time formatter ───────────────────────────────────
function relTime(iso){
  if(!iso)return"";
  const d=new Date(iso);if(isNaN(d))return iso;
  const diff=Date.now()-d.getTime();
  if(diff<60000)return"just now";
  if(diff<3600000)return Math.floor(diff/60000)+"m ago";
  if(diff<86400000)return Math.floor(diff/3600000)+"h ago";
  if(diff<7*86400000)return Math.floor(diff/86400000)+"d ago";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function renderStatus(){
  const m=statusMember;
  if(!m)return;

  // ── Team Invites ──────────────────────────────────────────────
  const invites=allRequests.filter(r=>r.type==="invite"&&r.toId===m.id&&r.status==="pending");
  const invBadge=el("inv-badge");
  const invEl=el("sc-invites");
  if(invites.length){
    invBadge.textContent=invites.length;show(invBadge);
    invEl.innerHTML=invites.map(r=>{
      const team=allTeams.find(t=>t.id===r.teamId);
      const capMember=team?allMembers.find(mb=>mb.id===team.captainId):null;
      const comp=Array.isArray(team?.composition)?team.composition:[];
      return`<div class="status-row" data-req-id="${r.id}">
        <div class="status-row-info">
          <div class="status-row-name">${esc(r.teamName)}</div>
          <div class="flex-center gap-xs mt-sm">
            ${capMember?memberAvatar(capMember,20):""}
            <span class="status-row-sub">${capMember?esc(capMember.name):"Captain"} invited you to join</span>
          </div>
          ${comp.length?`<div class="comp-row mt-sm">${comp.map(x=>`<span class="comp-pill comp-${x.toLowerCase()}">${x}</span>`).join("")}</div>`:""}
        </div>
        <div class="status-row-actions">
          <button class="btn btn-success btn-sm" onclick="respondInvite('${r.id}','accept')">Accept</button>
          <button class="btn btn-danger btn-sm" onclick="respondInvite('${r.id}','decline')">Decline</button>
        </div>
      </div>`;
    }).join("");
  }else{
    hide(invBadge);
    invEl.innerHTML=`<div class="status-empty"><div class="status-empty-icon">📭</div>No pending team invites.</div>`;
  }

  // ── Your Join Requests ────────────────────────────────────────
  const reqs=allRequests.filter(r=>r.type==="join"&&r.fromId===m.id&&r.status==="pending");
  const reqBadge=el("req-badge");
  const reqEl=el("sc-requests");
  if(reqs.length){
    reqBadge.textContent=reqs.length;show(reqBadge);
    reqEl.innerHTML=reqs.map(r=>`<div class="status-row" data-req-id="${r.id}">
      <div class="status-row-info">
        <div class="status-row-name">${esc(r.teamName)}</div>
        <div class="status-row-sub mt-sm">⏳ Awaiting captain approval</div>
      </div>
      <div class="status-row-actions">
        <button class="btn btn-danger btn-sm" onclick="cancelRequest('${r.id}')">Cancel</button>
      </div>
    </div>`).join("");
  }else{
    hide(reqBadge);
    reqEl.innerHTML=`<div class="status-empty"><div class="status-empty-icon">📤</div>No pending join requests.</div>`;
  }

  // ── Captain: Join Requests to Your Teams ─────────────────────
  const capSecEl=el("captain-section");
  if(capSecEl)capSecEl.style.display="block";
  const capTeams=allTeams.filter(t=>t.captainId===m.id);
  const jrqBadge=el("jrq-badge");
  const jrqEl=el("sc-joinreqs");

  if(!capTeams.length){
    hide(jrqBadge);
    jrqEl.innerHTML=`<div class="status-empty" style="padding:1.5rem;text-align:center;">
      <div style="font-size:1.5rem;margin-bottom:0.5rem;opacity:0.4;">⚜️</div>
      <div style="font-size:0.88rem;color:var(--text2);margin-bottom:0.75rem;">You are not currently a captain of any team.</div>
      <div style="font-size:0.82rem;color:var(--text3);margin-bottom:1rem;">Want to become a captain?</div>
      <div class="flex gap-sm" style="justify-content:center;flex-wrap:wrap;">
        <a href="index.html" class="btn btn-ghost btn-sm">🔍 Find a Team Seeking a Captain</a>
        <a href="create-team.html" class="btn btn-primary btn-sm">⚔️ Start Your Own Team</a>
      </div>
    </div>`;
  }else{
    const capReqs=allRequests.filter(r=>r.type==="join"&&capTeams.map(t=>t.id).includes(r.teamId)&&r.status==="pending");
    if(capReqs.length){
      jrqBadge.textContent=capReqs.length;show(jrqBadge);
      jrqEl.innerHTML=capReqs.map(r=>{
        const ap=allMembers.find(mb=>mb.id===r.fromId)||{name:"Unknown",gamertag:"",class:"",power:"",level:"",avatarUrl:""};
        return`<div class="status-row" data-req-id="${r.id}">
          <div class="status-row-info">
            <div class="flex-center gap-sm mb-sm">
              ${memberAvatar(ap,34)}
              <div>
                <div class="status-row-name">${esc(ap.name)}</div>
                <div class="status-row-sub">${esc(ap.gamertag||"")}${ap.class?" · "+esc(CLASS_ICONS[ap.class]||"")+" "+esc(ap.class):""}${ap.power?" · ⚡"+formatPower(ap.power):""}${ap.level?" · Lv."+esc(String(ap.level)):""}</div>
              </div>
            </div>
            <div class="status-row-sub">Requesting to join <strong style="color:var(--text);">${esc(r.teamName)}</strong></div>
          </div>
          <div class="status-row-actions">
            <button class="btn btn-success btn-sm" onclick="respondJoin('${r.id}','accept')">Accept</button>
            <button class="btn btn-danger btn-sm" onclick="respondJoin('${r.id}','decline')">Decline</button>
          </div>
        </div>`;
      }).join("");
    }else{
      hide(jrqBadge);
      jrqEl.innerHTML=`<div class="status-empty"><div class="status-empty-icon">⚜️</div>No pending join requests to your teams.</div>`;
    }
  }

  // ── Recent Activity ───────────────────────────────────────────
  const ACTIVITY_DAYS=14;
  const cutoff=Date.now()-ACTIVITY_DAYS*24*60*60*1000;
  const capTeamIds=capTeams.map(t=>t.id);
  const seen=getSeenActivity(m.id);

  // Collect resolved requests relevant to this user
  const actItems=allRequests.filter(r=>{
    if(r.status==="pending")return false;
    const ts=new Date(r.createdAt).getTime();
    if(isNaN(ts)||ts<cutoff)return false;
    // Join requests I sent
    if(r.type==="join"&&r.fromId===m.id)return true;
    // Invites I received
    if(r.type==="invite"&&r.toId===m.id)return true;
    // Join requests to teams I captain (accepted/declined by me or co-captain)
    if(r.type==="join"&&capTeamIds.includes(r.teamId))return true;
    return false;
  }).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const newIds=actItems.filter(r=>!seen.includes(r.id)).map(r=>r.id);
  const actBadge=el("act-badge");
  const actEl=el("sc-activity");

  if(actItems.length){
    // Mark all as seen now that user is viewing this page
    markActivitySeen(m.id,actItems.map(r=>r.id));

    if(newIds.length){
      actBadge.textContent=newIds.length;show(actBadge);
    }else{
      hide(actBadge);
    }

    actEl.innerHTML=actItems.map(r=>{
      const isNew=newIds.includes(r.id);
      const newPill=isNew?`<span class="act-pill act-pill-new">NEW</span>`:"";

      let icon="📋",mainText="",statusPill="";
      const statusColors={accepted:"act-pill-accepted",declined:"act-pill-declined",cancelled:"act-pill-cancelled"};
      const statusIcons={accepted:"✅",declined:"❌",cancelled:"✗"};
      const statusLabels={accepted:"Accepted",declined:"Declined",cancelled:"Cancelled"};
      const sc=statusColors[r.status]||"act-pill-cancelled";
      const si=statusIcons[r.status]||"·";
      const sl=statusLabels[r.status]||r.status;
      statusPill=`<span class="act-pill ${sc}">${si} ${sl}</span>`;

      if(r.type==="join"&&r.fromId===m.id){
        // My join request — what happened to it
        icon="📤";
        mainText=`Your join request to <strong>${esc(r.teamName)}</strong>${statusPill}${newPill}`;
      }else if(r.type==="invite"&&r.toId===m.id){
        // Invite I received — what I did with it
        icon="📨";
        const action=r.status==="accepted"?"You accepted":"You declined";
        mainText=`${action} an invite from <strong>${esc(r.teamName)}</strong>${statusPill}${newPill}`;
      }else if(r.type==="join"&&capTeamIds.includes(r.teamId)){
        // Join request to my team — what happened
        icon="⚜️";
        const applicant=allMembers.find(mb=>mb.id===r.fromId);
        const aName=applicant?esc(applicant.name):"A member";
        mainText=`${aName} — request to join <strong>${esc(r.teamName)}</strong>${statusPill}${newPill}`;
      }

      return`<div class="act-row">
        <div class="act-row-icon">${icon}</div>
        <div class="act-row-body">
          <div class="act-row-main">${mainText}</div>
          <div class="act-row-time">${relTime(r.createdAt)}</div>
        </div>
      </div>`;
    }).join("");
  }else{
    hide(actBadge);
    actEl.innerHTML=`<div class="status-empty"><div class="status-empty-icon">🕐</div>No activity in the last ${ACTIVITY_DAYS} days.</div>`;
  }

  // ── Toast for new unseen items (once per session) ─────────────
  if(newIds.length>0&&!sessionStorage.getItem("inv_activity_toasted_"+m.id)){
    sessionStorage.setItem("inv_activity_toasted_"+m.id,"1");
    const plural=newIds.length===1?"update":"updates";
    toast(`${newIds.length} new ${plural} in Recent Activity`,"amber",4000);
  }
}

// ── Inline feedback helper ────────────────────────────────────
function showRowFeedback(reqId,msg,color){
  const rowEl=document.querySelector(`[data-req-id="${reqId}"]`);
  if(!rowEl)return;
  rowEl.innerHTML=`<div class="status-row-feedback">
    <span style="font-size:0.95rem;">${color==="green"?"✅":color==="red"?"❌":"✗"}</span>
    <span style="color:var(--${color==="green"?"green":color==="red"?"red":"text3"})">${msg}</span>
  </div>`;
  rowEl.style.opacity="0.75";
}

// ── Actions ───────────────────────────────────────────────────
async function respondInvite(reqId,decision){
  const session=getSession();if(!session)return;
  const isAccept=decision==="accept";
  // Immediately disable buttons via inline feedback
  showRowFeedback(reqId,"Sending…","");
  try{
    await apiPost({action:"respondInvite",memberId:session.id,captainKey:session.captainKey,requestId:reqId,decision});
    const r=allRequests.find(x=>x.id===reqId);
    if(r){
      r.status=isAccept?"accepted":"declined";
      if(isAccept&&statusMember){statusMember.teamIds=[...(statusMember.teamIds||[]),r.teamId];}
    }
    showRowFeedback(reqId,isAccept?"Joined team!":"Invite declined.",isAccept?"green":"red");
    toast(isAccept?"You joined the team!":"Invite declined.",isAccept?"success":"info",2500);
    setTimeout(()=>renderStatus(),1400);
  }catch(e){
    renderStatus();// restore row on error
    toast(e.message,"error");
  }
}

async function respondJoin(reqId,decision){
  const session=getSession();if(!session)return;
  const isAccept=decision==="accept";
  showRowFeedback(reqId,"Sending…","");
  try{
    await apiPost({action:"respondRequest",memberId:session.id,captainKey:session.captainKey,requestId:reqId,accept:isAccept});
    const r=allRequests.find(x=>x.id===reqId);
    if(r){
      r.status=isAccept?"accepted":"declined";
      if(isAccept){
        // Cancel other pending requests for this member+team locally
        allRequests.filter(x=>x.id!==reqId&&x.status==="pending"&&x.teamId===r.teamId&&(x.fromId===r.fromId||x.toId===r.fromId))
          .forEach(x=>x.status="cancelled");
      }
    }
    const applicant=r?allMembers.find(mb=>mb.id===r.fromId):null;
    const aName=applicant?applicant.name:"Member";
    showRowFeedback(reqId,isAccept?`${aName} added to team!`:"Request declined.",isAccept?"green":"red");
    toast(isAccept?`${aName} has been added to the team!`:"Request declined.",isAccept?"success":"info",2500);
    setTimeout(()=>renderStatus(),1400);
  }catch(e){
    renderStatus();
    toast(e.message,"error");
  }
}

async function cancelRequest(reqId){
  const session=getSession();if(!session)return;
  showRowFeedback(reqId,"Cancelling…","");
  try{
    await apiPost({action:"cancelRequest",memberId:session.id,captainKey:session.captainKey,requestId:reqId});
    // Set status to cancelled (not splice) so it appears in Recent Activity
    const r=allRequests.find(x=>x.id===reqId);
    if(r)r.status="cancelled";
    showRowFeedback(reqId,"Request cancelled.","");
    toast("Request cancelled.","info",2000);
    setTimeout(()=>renderStatus(),1200);
  }catch(e){
    renderStatus();
    toast(e.message,"error");
  }
}
</script>
</body>
</html>
